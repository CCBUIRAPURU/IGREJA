<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Congregação Cristã no Brasil</title>
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                    url('https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/CCB_Congrega%C3%A7%C3%A3o_Crist%C3%A3_no_Brasil.jpg/1920px-CCB_Congrega%C3%A7%C3%A3o_Crist%C3%A3_no_Brasil.jpg') no-repeat center center/cover;
        color: white;
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    header {
        padding: 30px 10px 10px;
        font-size: 2em;
        font-weight: bold;
        text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        animation: fadeInDown 1.2s ease;
    }
    main {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .link-btn {
        display: block;
        width: 260px;
        background: rgba(0, 100, 0, 0.85);
        padding: 15px;
        margin: 15px 0;
        border-radius: 10px;
        color: white;
        text-decoration: none;
        font-size: 1.3em;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        transition: transform 0.3s, background 0.3s;
        animation: fadeInUp 1.2s ease;
    }
    .link-btn:hover {
        transform: scale(1.05);
        background: rgba(0, 150, 0, 0.95);
    }
    footer {
        padding: 15px;
        font-size: 0.9em;
        background: rgba(0,0,0,0.5);
    }
    @keyframes fadeInDown {
        from {opacity: 0; transform: translateY(-30px);}
        to {opacity: 1; transform: translateY(0);}
    }
    @keyframes fadeInUp {
        from {opacity: 0; transform: translateY(30px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>
<body>

<header>
    Congregação Cristã no Brasil
</header>
