<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Relatório de Coletas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .hover-scale {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hover-scale:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover {
            background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .checkbox-custom {
            appearance: none;
            -webkit-appearance: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #d1d5db;
            border-radius: 0.375rem;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .checkbox-custom:checked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }
        
        .checkbox-custom:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 0.875rem;
            font-weight: bold;
        }
        
        .input-focus {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }
        
        .input-focus:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                font-family: 'Inter', sans-serif;
                background: white !important;
                padding: 15mm 10mm;
            }
            @page {
                size: A4 portrait;
                margin: 0;
            }
            .no-print {
                display: none !important;
            }
            .print-container {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
            }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="gradient-bg min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useCallback, useMemo, Fragment } = React;

        // ----- Icon Components -----
        const CalendarIcon = ({ className = "" }) => (
            <svg
                xmlns="http://www.w3.org/2000/svg"
                className={className}
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                strokeWidth={2}
            >
                <path
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                />
            </svg>
        );

        const PrintIcon = ({ className = "" }) => (
            <svg
                xmlns="http://www.w3.org/2000/svg"
                className={className}
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                strokeWidth={2}
            >
                <path
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"
                />
            </svg>
        );

        const SparklesIcon = ({ className = "" }) => (
            <svg
                xmlns="http://www.w3.org/2000/svg"
                className={className}
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                strokeWidth={2}
            >
                <path
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"
                />
            </svg>
        );

        // ----- ReportTable Component -----
        const ReportTable = ({ data, month, dayOfWeek }) => {
            const getMonthYearTitle = () => {
                if (!month) return '';
                const [year, monthNum] = month.split('-');
                const date = new Date(Number(year), Number(monthNum) - 1, 1);
                return date.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
            };

            const weeklyData = useMemo(() => {
                if (!data || data.length === 0) {
                    return [];
                }
                const getWeekStart = (date) => {
                    const d = new Date(date);
                    const day = d.getUTCDay();
                    const diff = d.getUTCDate() - day + (day === 0 ? -6 : 1);
                    return new Date(d.setUTCDate(diff));
                };
                const weeks = [];
                let currentWeek = [];
                let currentWeekStart = null;
                data.forEach((row, index) => {
                    const rowDateStr = row.id.replace('-duplicate', '');
                    const rowDate = new Date(rowDateStr);
                    const weekStart = getWeekStart(rowDate);
                    const weekKey = weekStart.toISOString().split('T')[0];
                    if (currentWeekStart === null || currentWeekStart !== weekKey) {
                        if (currentWeek.length > 0) {
                            weeks.push(currentWeek);
                        }
                        currentWeek = [];
                        currentWeekStart = weekKey;
                    }
                    currentWeek.push(row);
                    if (index === data.length - 1) {
                        weeks.push(currentWeek);
                    }
                });
                return weeks;
            }, [data]);

            if (!weeklyData || weeklyData.length === 0) {
                return null;
            }

            return (
                <div
                    id="report-sheet"
                    className="mt-8 bg-white rounded-2xl shadow-2xl border-0 overflow-hidden print-container animate-fade-in"
                >
                    <div className="bg-gradient-to-r from-indigo-500 to-purple-600 p-8 text-white">
                        <h2 className="text-3xl font-bold text-center mb-2">Relatório Mensal</h2>
                        <p className="text-center text-indigo-100 text-lg capitalize font-medium">
                            {`${getMonthYearTitle()} - ${dayOfWeek}`}
                        </p>
                    </div>
                    <div className="p-8">
                        <table className="w-full border-collapse">
                            <thead>
                                <tr className="border-b-2 border-gray-200">
                                    <th className="p-4 text-left font-bold text-gray-700 bg-gray-50 text-lg rounded-tl-lg">Data</th>
                                    <th className="p-4 text-left font-bold text-gray-700 bg-gray-50 text-lg">Dinheiro</th>
                                    <th className="p-4 text-left font-bold text-gray-700 bg-gray-50 text-lg rounded-tr-lg">Cartão</th>
                                </tr>
                            </thead>
                            <tbody>
                                {weeklyData.map((week, weekIndex) => (
                                    <Fragment key={`week-${weekIndex}`}>
                                        {week.map((row, rowIndex) => (
                                            <tr
                                                key={row.id}
                                                className={`border-b border-gray-100 hover:bg-gray-50 transition-colors ${
                                                    rowIndex % 2 === 0 ? 'bg-white' : 'bg-gray-50'
                                                }`}
                                            >
                                                <td className="p-4 font-medium text-gray-700">{row.formattedDate}</td>
                                                <td className="p-4 h-12 border-l border-gray-100 text-gray-700">R$</td>
                                                <td className="p-4 border-l border-gray-100 text-gray-700">R$</td>
                                            </tr>
                                        ))}
                                        <tr key={`total-${weekIndex}`} className="border-b-2 border-indigo-200 bg-gradient-to-r from-indigo-50 to-purple-50">
                                            <td className="p-4 font-bold text-indigo-700 text-lg">Total Semanal</td>
                                            <td className="p-4 h-12 font-bold border-l border-indigo-100 text-indigo-700">R$</td>
                                            <td className="p-4 font-bold border-l border-indigo-100 text-indigo-700">R$</td>
                                        </tr>
                                    </Fragment>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // ----- App Component -----
        const App = () => {
            const today = new Date();
            const currentMonthValue = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;

            const [selectedMonth, setSelectedMonth] = useState(currentMonthValue);
            
            const daysOfWeek = useMemo(() => [
                { value: '0', label: 'Domingo' },
                { value: '1', label: 'Segunda' },
                { value: '2', label: 'Terça' },
                { value: '3', label: 'Quarta' },
                { value: '4', label: 'Quinta' },
                { value: '5', label: 'Sexta' },
                { value: '6', label: 'Sábado' }
            ], []);

            const initialSelectedDays = useMemo(() => {
                const initial = {};
                daysOfWeek.forEach(day => {
                    initial[day.value] = day.value === '1'; // Default to Monday
                });
                return initial;
            }, [daysOfWeek]);
            
            const initialDuplicatedDays = useMemo(() => {
                const initial = {};
                daysOfWeek.forEach(day => {
                    initial[day.value] = false;
                });
                return initial;
            }, [daysOfWeek]);

            const [selectedDays, setSelectedDays] = useState(initialSelectedDays);
            const [duplicatedDays, setDuplicatedDays] = useState(initialDuplicatedDays);
            const [availableDates, setAvailableDates] = useState([]);
            const [error, setError] = useState('');
            const [reportDayOfWeekTitle, setReportDayOfWeekTitle] = useState('');

            const handleDaySelectionChange = useCallback((event) => {
                const { value, checked } = event.target;
                setSelectedDays(prev => ({
                    ...prev,
                    [value]: checked
                }));
                setAvailableDates([]);
            }, []);
            
            const handleDayDuplicationChange = useCallback((event) => {
                const { value, checked } = event.target;
                setDuplicatedDays(prev => ({
                    ...prev,
                    [value]: checked
                }));
                setAvailableDates([]);
            }, []);

            const allWeekDaysSelected = useMemo(() => 
                daysOfWeek.every(day => selectedDays[day.value]), 
                [daysOfWeek, selectedDays]
            );

            const handleSelectAllWeekDays = useCallback((event) => {
                const { checked } = event.target;
                const newSelectedDays = {};
                daysOfWeek.forEach(day => {
                    newSelectedDays[day.value] = checked;
                });
                setSelectedDays(newSelectedDays);
                setAvailableDates([]);
            }, [daysOfWeek]);

            const handleGenerateReport = useCallback(() => {
                if (!selectedMonth) {
                    setError('Por favor, escolha um mês e ano.');
                    setAvailableDates([]);
                    return;
                }
                const activeDayValues = Object.entries(selectedDays)
                    .filter(([, isSelected]) => isSelected)
                    .map(([dayValue]) => parseInt(dayValue, 10));
                if (activeDayValues.length === 0) {
                    setError('Por favor, selecione pelo menos um dia da semana.');
                    setAvailableDates([]);
                    setReportDayOfWeekTitle('');
                    return;
                }
                setError('');
                const [year, month] = selectedMonth.split('-').map(Number);
                const dates = [];
                const daysInMonth = new Date(year, month, 0).getDate();
                for (let day = 1; day <= daysInMonth; day++) {
                    const currentDate = new Date(Date.UTC(year, month - 1, day));
                    const dayOfWeekValue = currentDate.getUTCDay();

                    if (activeDayValues.includes(dayOfWeekValue)) {
                        const dateInfo = {
                             formattedDate: currentDate.toLocaleDateString('pt-BR', { 
                                timeZone: 'UTC',
                                day: '2-digit',
                                month: '2-digit',
                                year: 'numeric'
                            }),
                            selected: true,
                        };
                        
                        dates.push({ ...dateInfo, id: currentDate.toISOString() });

                        if (duplicatedDays[dayOfWeekValue]) {
                            dates.push({ ...dateInfo, id: `${currentDate.toISOString()}-duplicate` });
                        }
                    }
                }
                
                const sortedDates = dates.sort((a, b) => {
                    const dateA = new Date(a.id.replace('-duplicate', ''));
                    const dateB = new Date(b.id.replace('-duplicate', ''));
                    if (dateA.getTime() !== dateB.getTime()) {
                        return dateA.getTime() - dateB.getTime();
                    }
                    return a.id.includes('-duplicate') ? 1 : -1;
                });

                setAvailableDates(sortedDates);
                
                const selectedLabels = daysOfWeek
                    .filter(day => selectedDays[day.value])
                    .map(day => day.label);
                const pluralize = (label) => {
                    const pluralMap = {
                        'Segunda': 'Segundas-feiras', 'Terça': 'Terças-feiras', 'Quarta': 'Quartas-feiras',
                        'Quinta': 'Quintas-feiras', 'Sexta': 'Sextas-feiras', 'Sábado': 'Sábados', 'Domingo': 'Domingos'
                    };
                    return pluralMap[label] || label;
                };
                if (selectedLabels.length === daysOfWeek.length) {
                    setReportDayOfWeekTitle('Todos os Dias');
                } else if (selectedLabels.length > 1) {
                    setReportDayOfWeekTitle(selectedLabels.join(', '));
                } else if (selectedLabels.length === 1) {
                    setReportDayOfWeekTitle(pluralize(selectedLabels[0]));
                } else {
                    setReportDayOfWeekTitle('');
                }
            }, [selectedMonth, selectedDays, daysOfWeek, duplicatedDays]);

            const handleToggleDate = useCallback((id) => {
                setAvailableDates(prevDates =>
                    prevDates.map(date =>
                        date.id === id ? { ...date, selected: !date.selected } : date
                    )
                );
            }, []);
            
            const allDatesSelected = useMemo(() => 
                availableDates.length > 0 && availableDates.every(d => d.selected), 
                [availableDates]
            );

            const handleToggleAllDates = useCallback(() => {
                setAvailableDates(prevDates =>
                    prevDates.map(date => ({ ...date, selected: !allDatesSelected }))
                );
            }, [allDatesSelected]);

            const finalReportData = useMemo(() => {
                return availableDates
                    .filter(d => d.selected)
                    .map(d => ({ id: d.id, formattedDate: d.formattedDate }))
                    .sort((a, b) => {
                         const dateA = new Date(a.id.replace('-duplicate', ''));
                         const dateB = new Date(b.id.replace('-duplicate', ''));
                         if (dateA.getTime() !== dateB.getTime()) {
                             return dateA.getTime() - dateB.getTime();
                         }
                         return a.id.includes('-duplicate') ? 1 : -1;
                    });
            }, [availableDates]);

            const handlePrint = useCallback(() => {
                window.print();
            }, []);

            const handleMonthChange = useCallback((e) => {
                setSelectedMonth(e.target.value);
                setAvailableDates([]);
                setError('');
            }, []);

            return (
                <div className="min-h-screen py-12 px-4 print:p-0">
                    <div className="max-w-6xl mx-auto">
                        <div className="text-center mb-16 animate-fade-in no-print">
                            <div className="inline-flex items-center gap-3 mb-6">
                                <SparklesIcon className="h-8 w-8 text-yellow-300" />
                                <h1 className="text-5xl font-black text-white tracking-tight drop-shadow-lg">
                                    Gerador de Relatório
                                </h1>
                                <SparklesIcon className="h-8 w-8 text-yellow-300" />
                            </div>
                            <p className="text-xl text-indigo-100 font-medium max-w-2xl mx-auto leading-relaxed">
                                Crie relatórios mensais personalizados com design profissional e formatação A4 perfeita
                            </p>
                        </div>

                        <div className="bg-white rounded-3xl shadow-2xl border-0 overflow-hidden mb-8 no-print hover-scale card-shadow">
                            <div className="bg-gradient-to-r from-indigo-500 to-purple-600 p-6">
                                <h2 className="text-2xl font-bold text-white text-center">⚙️ Configurações do Relatório</h2>
                            </div>
                            <div className="p-8">
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="space-y-3">
                                        <label htmlFor="mes" className="block text-lg font-bold text-gray-700 mb-3">
                                            📅 Selecione o Mês/Ano
                                        </label>
                                        <input
                                            type="month"
                                            id="mes"
                                            value={selectedMonth}
                                            onChange={handleMonthChange}
                                            className="w-full px-4 py-3 text-lg rounded-xl input-focus outline-none font-medium"
                                        />
                                    </div>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center">
                                            <label className="text-lg font-bold text-gray-700">📋 Dias da Semana</label>
                                            <div className="flex items-center gap-3 bg-indigo-50 px-4 py-2 rounded-lg">
                                                <input
                                                    type="checkbox"
                                                    id="select-all-days"
                                                    checked={allWeekDaysSelected}
                                                    onChange={handleSelectAllWeekDays}
                                                    className="checkbox-custom"
                                                />
                                                <label htmlFor="select-all-days" className="font-bold text-indigo-700 cursor-pointer">
                                                    Selecionar Todos
                                                </label>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-x-4 gap-y-2">
                                            {daysOfWeek.map(day => (
                                                <div key={day.value} className="flex items-center gap-2 p-3 rounded-lg hover:bg-gray-50 transition-colors">
                                                    <input
                                                        type="checkbox"
                                                        id={`duplicate-day-${day.value}`}
                                                        value={day.value}
                                                        checked={duplicatedDays[day.value] || false}
                                                        onChange={handleDayDuplicationChange}
                                                        className="checkbox-custom"
                                                        title={`Duplicar ${day.label}`}
                                                    />
                                                    <input
                                                        type="checkbox"
                                                        id={`day-${day.value}`}
                                                        value={day.value}
                                                        checked={selectedDays[day.value] || false}
                                                        onChange={handleDaySelectionChange}
                                                        className="checkbox-custom"
                                                    />
                                                    <label htmlFor={`day-${day.value}`} className="font-medium text-gray-700 cursor-pointer whitespace-nowrap">
                                                        {day.label}
                                                    </label>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {error && (
                                    <div className="mt-6 p-4 bg-red-50 border-l-4 border-red-400 rounded-lg animate-fade-in">
                                        <p className="text-red-700 font-medium">❌ {error}</p>
                                    </div>
                                )}

                                <div className="mt-8 flex flex-col sm:flex-row gap-4">
                                    <button
                                        onClick={handleGenerateReport}
                                        className="flex-1 btn-gradient text-white font-bold py-4 px-8 rounded-xl flex items-center justify-center gap-3 text-lg shadow-lg"
                                    >
                                        <CalendarIcon className="h-6 w-6" />
                                        Gerar Datas do Relatório
                                    </button>
                                    {finalReportData.length > 0 && (
                                        <button
                                            onClick={handlePrint}
                                            className="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-8 rounded-xl flex items-center justify-center gap-3 text-lg shadow-lg transition-all hover-scale"
                                        >
                                            <PrintIcon className="h-6 w-6" />
                                            Imprimir Relatório
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>

                        {availableDates.length > 0 && (
                            <div className="bg-white rounded-3xl shadow-2xl border-0 overflow-hidden mb-8 no-print animate-fade-in hover-scale">
                                <div className="bg-gradient-to-r from-emerald-500 to-teal-600 p-6">
                                    <div className="flex justify-between items-center">
                                        <h3 className="text-2xl font-bold text-white">📋 Selecione as Datas Específicas</h3>
                                        <div className="flex items-center gap-3 bg-emerald-600 px-4 py-2 rounded-lg">
                                            <input
                                                type="checkbox"
                                                id="select-all-dates"
                                                checked={allDatesSelected}
                                                onChange={handleToggleAllDates}
                                                className="checkbox-custom"
                                            />
                                            <label htmlFor="select-all-dates" className="font-bold text-white cursor-pointer">
                                                Todas as Datas
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-8">
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                        {availableDates.map((date) => (
                                            <div
                                                key={date.id}
                                                role="button"
                                                tabIndex={0}
                                                aria-pressed={date.selected}
                                                onClick={() => handleToggleDate(date.id)}
                                                onKeyDown={(e) => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); handleToggleDate(date.id); }}}
                                                className={`p-4 rounded-xl border-2 transition-all cursor-pointer hover-scale focus:outline-none focus:ring-2 focus:ring-indigo-500 ${
                                                    date.selected 
                                                        ? 'border-indigo-500 bg-indigo-50' 
                                                        : 'border-gray-200 hover:border-indigo-300'
                                                }`}
                                            >
                                                <div className="flex items-center gap-3 pointer-events-none">
                                                    <input
                                                        type="checkbox"
                                                        checked={date.selected}
                                                        readOnly
                                                        tabIndex={-1}
                                                        className="checkbox-custom"
                                                    />
                                                    <label className="font-medium text-gray-700 cursor-pointer text-sm">
                                                        {date.formattedDate}
                                                    </label>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <ReportTable data={finalReportData} month={selectedMonth} dayOfWeek={reportDayOfWeekTitle} />
                    </div>
                </div>
            );
        };

        // ----- Mount App -----
        const rootElement = document.getElementById('root');
        if (rootElement) {
          const root = ReactDOM.createRoot(rootElement);
          root.render(React.createElement(App));
        }
    </script>
</body>
</html>
