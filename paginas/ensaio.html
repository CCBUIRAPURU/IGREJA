                'Músicos', 'Organistas', 'Total (Músicos + Organistas)', 
                'Irmãos Presentes', 'Irmãs Presentes', 'Total (Irmãos + Irmãs)',
                'Ministério Presente', 'Total Geral de Pessoas Envolvidas'
            ];
            
            const renderCell = (value) => value === 0 ? '0' : (value || '\u00A0');
            
            const totalHymnsByMonth = MONTHS_LIST_REHEARSAL.map(m => (hymns[m.value] || []).length);
            const totalAnnualHymns = totalHymnsByMonth.reduce((a, b) => a + b, 0);

            const hymnFrequency = {};
            Object.values(hymns).flat().forEach(hymn => {
                if (hymn && String(hymn).trim()) {
                    hymnFrequency[hymn] = (hymnFrequency[hymn] || 0) + 1;
                }
            });
            const top10Hymns = Object.entries(hymnFrequency).sort(([, a], [, b]) => b - a).slice(0, 10);
            const maxHymnCount = top10Hymns.length > 0 ? top10Hymns[0][1] : 0;

            const monthlyTotals = presences['Total Geral de Pessoas Envolvidas'] || [];
            const validMonths = monthlyTotals.filter(v => typeof v === 'number');
            const averagePresence = validMonths.length > 0 ? Math.round(validMonths.reduce((a, b) => a + b, 0) / validMonths.length) : 0;
            const maxPresence = Math.max(0, ...validMonths.map(v => v || 0));
            const busiestMonthIndex = monthlyTotals.indexOf(maxPresence);
            const busiestMonth = busiestMonthIndex > -1 ? SHORT_MONTHS_REHEARSAL[busiestMonthIndex] : 'N/A';

            const monthlyMusicians = presences['Total (Músicos + Organistas)'] || [];
            const validMusicianMonths = monthlyMusicians.filter(v => typeof v === 'number');
            const averageMusicians = validMusicianMonths.length > 0 ? Math.round(validMusicianMonths.reduce((a, b) => a + b, 0) / validMusicianMonths.length) : 0;
            
            const categoryTotals = {};
            let totalAllInstruments = 0;
            Object.entries(INSTRUMENT_CATEGORIES).forEach(([category, instruments]) => {
                const total = instruments.reduce((sum, instrument) => {
                    const monthlyCounts = instrumentQuantities[instrument] || [];
                    return sum + monthlyCounts.reduce((a, b) => a + (b || 0), 0);
                }, 0);
                categoryTotals[category] = total;
                totalAllInstruments += total;
            });
            const categoryPercentages = {};
            const categoryColors = { 'Madeiras': '#8064A2', 'Metais': '#4BACC6', 'Cordas': '#F79646', 'Teclas': '#92D050' };
            if (totalAllInstruments > 0) {
                for (const category in categoryTotals) {
                    categoryPercentages[category] = Math.round((categoryTotals[category] / totalAllInstruments) * 100);
                }
            }
            
            const annualMinistryTotals = {};
            if(ministryQuantities){
                MINISTRY_LIST.forEach(role => {
                    const monthlyCounts = ministryQuantities[role] || [];
                    annualMinistryTotals[role] = monthlyCounts.reduce((a, b) => a + (b || 0), 0);
                });
            }

            const monthlyCategoryTotals = {};
            Object.entries(INSTRUMENT_CATEGORIES).forEach(([category, instruments]) => {
                const totals = Array(12).fill(0);
                instruments.forEach(instrument => {
                    const monthlyCounts = instrumentQuantities[instrument] || [];
                    for(let i=0; i<12; i++) {
                        totals[i] += monthlyCounts[i] || 0;
                    }
                });
                monthlyCategoryTotals[category] = totals;
            });
            const maxCategoryValue = Math.max(1, ...Object.values(monthlyCategoryTotals).flat().map(v => v || 0));

            const monthlyOrchestra = presences['Total (Músicos + Organistas)'] || Array(12).fill(0);
            const monthlyCongregation = presences['Total (Irmãos + Irmãs)'] || Array(12).fill(0);
            const monthlyComparisonTotals = monthlyOrchestra.map((v, i) => (v || 0) + (monthlyCongregation[i] || 0));
            const maxComparisonTotal = Math.max(1, ...monthlyComparisonTotals);

            const LineChart = ({ data, colors, maxVal }) => {
                const width = 500; const height = 180; const padding = 20;
                const getPath = (dataSet) => {
                    const points = dataSet.map((val, i) => {
                        const x = (i / 11) * (width - 2 * padding) + padding;
                        const y = height - padding - (((val || 0) / maxVal) * (height - 2 * padding));
                        return `${x.toFixed(2)},${y.toFixed(2)}`;
                    }).join(' L ');
                    return `M ${points}`;
                };
                return (
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
                        {[...Array(5)].map((_, i) => ( <line key={i} x1={padding} y1={padding + (i/4)*(height-2*padding)} x2={width-padding} y2={padding + (i/4)*(height-2*padding)} stroke="#e5e7eb" strokeWidth="0.5" /> ))}
                        {Object.entries(data).map(([key, values]) => ( <path key={key} d={getPath(values)} stroke={colors[key]} fill="none" strokeWidth="1.5" /> ))}
                    </svg>
                );
            };

            const pageWrapperClass = !isSavingJpg ? 'mb-8' : '';

            return (
                <div ref={ref} className="p-4 print-container text-black" style={{ width: '1200px', fontFamily: 'Arial, sans-serif' }}>
                    <div className={`bg-white text-xs p-4 shadow-lg flex flex-col print-page ${pageWrapperClass}`} style={{ height: 'auto' }}>
                        <PageHeader year={year} />
                        <div className="mb-4">
                            <div className="text-center font-bold bg-slate-600 text-white py-1">Total de Presenças</div>
                            <table className="w-full border-collapse border border-slate-400">
                                <thead><tr className="bg-slate-200 font-bold"><th className="border border-slate-400 p-1">Categoria</th>{SHORT_MONTHS_REHEARSAL.map(m => <th key={m} className="border border-slate-400 p-1 text-center">{m}</th>)}<th className="border border-slate-400 p-1 text-center bg-slate-700 text-white">Total</th></tr></thead>
                                <tbody>
                                    {PRESENCE_CATEGORIES.map((cat) => {
                                        const rowData = presences[cat] || Array(12).fill(null);
                                        const rowTotal = rowData.reduce((acc, val) => acc + (val || 0), 0);
                                        const isGrandTotalRow = cat === 'Total Geral de Pessoas Envolvidas';
                                        const isMinistryHeaderRow = cat === 'Ministério Presente';
                                        let rowStyle = '';
                                        if (isGrandTotalRow) rowStyle = 'bg-[#c0504d] text-white font-bold';
                                        else if (cat.startsWith('Total (') || isMinistryHeaderRow) rowStyle = 'bg-slate-100 font-semibold';
                                        return (
                                            <Fragment key={cat}>
                                                <tr className={rowStyle}><td className={`border border-slate-400 p-1 font-semibold ${isGrandTotalRow ? 'text-white' : 'text-black'}`}>{cat}</td>{rowData.map((val, i) => <td key={i} className="border border-slate-400 p-1 text-center">{renderCell(val)}</td>)}<td className="border border-slate-400 p-1 text-center font-bold bg-slate-700 text-white">{rowTotal}</td></tr>
                                                {isMinistryHeaderRow && MINISTRY_LIST.map((role) => {
                                                    const ministryRowData = ministryQuantities[role] || Array(12).fill(null);
                                                    const ministryRowTotal = ministryRowData.reduce((acc, val) => acc + (val || 0), 0);
                                                    return ( <tr key={role}><td className={`border border-slate-400 p-1 text-black pl-4`}>{role}</td>{ministryRowData.map((val, i) => <td key={i} className="border border-slate-400 p-1 text-center">{renderCell(val)}</td>)}<td className="border border-slate-400 p-1 text-center font-bold bg-slate-700 text-white">{ministryRowTotal}</td></tr> );
                                                })}
                                            </Fragment>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                        <div className="flex-grow flex flex-col">
                            <div className="text-center font-bold bg-slate-600 text-white py-1">Hinos Ensaiados</div>
                            <table className="w-full border-collapse border border-slate-400 print:h-full">
                                <thead><tr className="bg-slate-200 font-bold"><th className="border border-slate-400 p-1 w-[12%]">Mês</th><th className="border border-slate-400 p-1">Hinos</th><th className="border border-slate-400 p-1 text-center w-[10%] bg-slate-700 text-white">Total</th></tr></thead>
                                <tbody>{MONTHS_LIST_REHEARSAL.map((month, i) => (<tr key={month.value}><td className="border border-slate-400 p-1 font-bold bg-slate-600 text-white text-center align-middle">{month.label.toUpperCase()}</td><td className="border border-slate-400 p-1 align-top"><div className="flex flex-wrap items-center gap-y-1">{(hymns[month.value] || []).map((h, j) => (<span key={j} className="px-2 border-r border-slate-400 last:border-r-0">{h}</span>))}</div></td><td className={`border border-slate-400 p-1 text-center font-bold text-white align-middle ${i % 2 === 0 ? 'bg-green-800' : 'bg-blue-900'}`}>{totalHymnsByMonth[i]}</td></tr>))}</tbody>
                                <tfoot><tr className="font-bold bg-[#c0504d] text-white"><th colSpan={2} className="border border-slate-400 p-1 text-right">Total de Hinos Anual</th><th className="border border-slate-400 p-1 text-center">{totalAnnualHymns}</th></tr></tfoot>
                            </table>
                        </div>
                    </div>
                    <div className={`bg-white text-xs p-4 shadow-lg flex flex-col justify-between print-page text-black ${pageWrapperClass}`} style={{ height: 'auto' }}>
                        <div>
                            <PageHeader year={year} />
                            <div className="flex-grow flex flex-col space-y-4">
                                <div>
                                    <div className="text-center font-bold text-lg bg-[#595959] text-white py-1 mb-2">Resumo Analítico Anual</div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-4 flex flex-col">
                                            <div className="border border-slate-400 p-2 flex-grow flex flex-col"><h3 className="text-center font-bold mb-2 uppercase">Presença Mensal (Total Geral)</h3><div className="flex-grow flex items-end justify-around px-2 gap-1">{monthlyTotals.map((total, i) => (<div key={i} className="w-full flex flex-col items-center justify-end h-full"><span className="text-[10px] font-semibold">{renderCell(total)}</span><div className="w-full bg-sky-500 rounded-t" style={{ height: `${maxPresence > 0 ? ((total || 0) / maxPresence) * 100 : 0}%` }}></div></div>))}</div><div className="flex justify-around text-center text-[10px] border-t mt-1 pt-1 font-bold">{SHORT_MONTHS_REHEARSAL.map(m => <span key={m} className="flex-1">{m}</span>)}</div></div>
                                            <div className="border border-slate-400 p-2"><h3 className="text-center font-bold mb-2 uppercase">Composição Média da Orquestra</h3><div className="w-full h-8 flex rounded overflow-hidden my-2">{Object.entries(categoryPercentages).map(([category, percentage]) => { if(!percentage || percentage === 0) return null; return ( <div key={category} className="flex items-center justify-center text-white text-xs font-bold" style={{ width: `${percentage}%`, backgroundColor: categoryColors[category] }}>{percentage > 5 ? `${percentage}%` : ''}</div> ) })}</div><div className="flex flex-wrap justify-center gap-x-4 gap-y-1 mt-2">{Object.entries(categoryColors).map(([category, color]) => ( <div key={category} className="flex items-center"><span className="w-3 h-3 mr-1" style={{ backgroundColor: color }}></span><span className="text-[10px]">{category} ({categoryPercentages[category] || 0}%)</span></div> ))}</div></div>
                                        </div>
                                        <div className="space-y-4 flex flex-col">
                                            <div className="border border-slate-400 p-2"><h3 className="text-center font-bold mb-2 uppercase">Principais Métricas Anuais</h3><div className="grid grid-cols-2 gap-2 text-center"><StatCard label="Média de Músicos" value={averageMusicians} bgColor="bg-blue-100"/><StatCard label="Média de Presença" value={averagePresence} bgColor="bg-sky-100"/><StatCard label="Mês de Pico" value={busiestMonth} bgColor="bg-amber-100"/><StatCard label="Total Hinos Ensaiados" value={totalAnnualHymns} bgColor="bg-green-100"/></div></div>
                                            <div className="border border-slate-400 p-2 flex-grow flex flex-col"><h3 className="text-center font-bold mb-2 uppercase">Top 10 Hinos Mais Ensaiados</h3><div className="space-y-1 px-2 mt-2">{top10Hymns.length > 0 ? top10Hymns.map(([hymn, count]) => ( <div key={hymn} className="flex items-center text-xs gap-2"><div className="w-8 font-bold text-slate-700 text-center">{hymn}</div><div className="flex-grow bg-slate-200 rounded h-5 flex items-center"><div className="bg-emerald-600 h-full rounded text-right px-1 flex items-center justify-end" style={{ width: `${maxHymnCount > 0 ? (count / maxHymnCount) * 100 : 0}%` }}><span className="text-white text-[10px] font-bold">{count}x</span></div></div></div> )) : <p className="text-center text-slate-500">Não há dados de hinos.</p>}</div></div>
                                            <div className="border border-slate-400 p-2"><h3 className="text-center font-bold mb-2 uppercase">Presença Anual do Ministério</h3><table className="w-full text-[10px]"><tbody>{MINISTRY_LIST.slice(0, 5).map(role => (<tr key={role} className="border-t first:border-t-0"><td className="p-1 font-semibold">{role}</td><td className="p-1 text-right font-bold">{annualMinistryTotals[role] || 0}</td></tr>))}</tbody></table></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex-grow border-t-2 border-slate-300 pt-2 flex flex-col">
                                    <div className="text-center font-bold text-base bg-[#595959] text-white py-1 mb-2">Análise de Tendências e Detalhes</div>
                                    <div className="grid grid-cols-2 gap-4 flex-grow">
                                         <div className="border border-slate-400 p-2 flex flex-col"><h3 className="text-center font-bold mb-1 uppercase">Tendência por Categoria de Instrumento</h3><div className="flex-grow relative"><LineChart data={monthlyCategoryTotals} colors={categoryColors} maxVal={maxCategoryValue} /></div><div className="flex flex-wrap justify-center gap-x-3 gap-y-1 text-[10px] border-t pt-1 mt-1">{Object.entries(categoryColors).map(([category, color]) => ( <div key={category} className="flex items-center"><span className="w-3 h-3 mr-1" style={{ backgroundColor: color }}></span><span>{category}</span></div> ))}</div></div>
                                        <div className="border border-slate-400 p-2 flex flex-col"><h3 className="text-center font-bold mb-1 uppercase">Comparativo: Orquestra vs. Irmandade</h3><div className="flex-grow flex items-end justify-around px-2 gap-1">{monthlyComparisonTotals.map((total, i) => { const orchestra = monthlyOrchestra[i] || 0; const congregation = monthlyCongregation[i] || 0; return ( <div key={i} className="w-full flex flex-col items-center justify-end h-full"><span className="text-[9px] font-semibold text-orange-600">{congregation}</span><span className="text-[9px] font-semibold text-sky-600 -mb-1">{orchestra}</span><div className="w-full flex flex-col-reverse rounded-t overflow-hidden" style={{ height: `${(total / maxComparisonTotal) * 100}%` }}><div style={{ height: `${total > 0 ? (congregation/total)*100 : 0}%`, backgroundColor: '#fdba74' }}></div><div style={{ height: `${total > 0 ? (orchestra/total)*100 : 0}%`, backgroundColor: '#7dd3fc' }}></div></div></div> )})}</div><div className="flex justify-around text-center text-[10px] border-t mt-1 pt-1 font-bold">{SHORT_MONTHS_REHEARSAL.map(m => <span key={m} className="flex-1">{m}</span>)}</div></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        });

        const RehearsalAnnualReportView = ({ supabaseInstance }) => {
          const [cep, setCep] = useState(''); const [inputCep, setInputCep] = useState('');
          const [churchData, setChurchData] = useState({ name: '', availableYears: [String(new Date().getFullYear())] });
          const [displayedYear, setDisplayedYear] = useState(String(new Date().getFullYear()));
          const [annualData, setAnnualData] = useState(null); const [isLoading, setIsLoading] = useState(false);
          const [error, setError] = useState(''); const [isSavingJpg, setIsSavingJpg] = useState(false);
          const printableRef = useRef(null);
          const wrapperRef = useRef(null); // Ref for the scaling container

          const handleCepSubmit = (e) => { e.preventDefault(); setCep(inputCep.replace(/\D/g, '')); };
          
          useEffect(() => {
              const reportEl = printableRef.current;
              const wrapperEl = wrapperRef.current;
              if (!reportEl || !wrapperEl) return;

              const observer = new ResizeObserver(entries => {
                  const entry = entries[0];
                  if (!entry) return;
                  
                  const wrapperWidth = entry.contentRect.width;
                  const reportWidth = 1200; 

                  if (wrapperWidth > 0 && wrapperWidth < reportWidth) {
                      const scale = wrapperWidth / reportWidth;
                      reportEl.style.transform = `scale(${scale})`;
                      reportEl.style.transformOrigin = 'top center';
                  } else {
                      reportEl.style.transform = 'none';
                  }
              });

              observer.observe(wrapperEl);

              return () => observer.disconnect();
          }, [annualData]);

          useEffect(() => {
            const fetchChurchMetadata = async () => {
              if (!cep || cep.length !== 8 || !supabaseInstance) { setChurchData({ name: '', availableYears: [String(new Date().getFullYear())] }); setAnnualData(null); return; }
              setIsLoading(true); setError('');
              const { data, error: err } = await supabaseInstance.from('rehearsal_reports').select('year, report_data->header->>church').eq('cep', cep);
              if(err) { setError('Falha ao buscar dados do CEP.'); setChurchData({ name: '', availableYears: [String(new Date().getFullYear())] }); } 
              else if (data && data.length > 0) {
                  const fetchedYears = new Set(data.map(y => String(y.year))); fetchedYears.add(String(new Date().getFullYear()));
                  const sortedYears = Array.from(fetchedYears).sort((a,b) => parseInt(b) - parseInt(a));
                  const latestReport = data.sort((a,b) => b.year - a.year).find(r => r.report_data?.header?.church); // Access nested church name
                  setChurchData({ name: latestReport ? latestReport.report_data.header.church : 'Igreja (Nome não encontrado)', availableYears: sortedYears });
                  if (!sortedYears.includes(displayedYear) && sortedYears.length > 0) setDisplayedYear(sortedYears[0]);
              } else { setChurchData({ name: 'Igreja (Nenhum relatório)', availableYears: [String(new Date().getFullYear())] }); }
              setIsLoading(false);
            };
            fetchChurchMetadata();
          }, [cep, displayedYear, supabaseInstance]);

          useEffect(() => {
            const loadAnnualData = async () => {
              if (!cep || !displayedYear || !supabaseInstance) return setAnnualData(null);
              setIsLoading(true); setError(''); setAnnualData(null);
              const { data: reports, error: fetchError } = await supabaseInstance.from('rehearsal_reports').select('report_data').eq('cep', cep).eq('year', parseInt(displayedYear));
              if(fetchError) { setError("Falha ao carregar dados anuais."); }
              else if (reports && reports.length > 0) {
                  const PRESENCE_CATEGORIES = ['Músicos', 'Organistas', 'Total (Músicos + Organistas)', 'Irmãos Presentes', 'Irmãs Presentes', 'Total (Irmãos + Irmãs)', 'Ministério Presente', 'Total Geral de Pessoas Envolvidas'];
                  const presences = {}; PRESENCE_CATEGORIES.forEach(cat => presences[cat] = Array(12).fill(null));
                  const hymns = {}; for (let i = 1; i <= 12; i++) { hymns[String(i)] = []; }
                  const instrumentQuantities = {}; INSTRUMENTS_LIST.forEach(inst => { instrumentQuantities[inst] = Array(12).fill(null); });
                  const ministryQuantities = {}; MINISTRY_LIST.forEach(role => { ministryQuantities[role] = Array(12).fill(null); });
                  
                  reports.forEach(record => {
                      const report = record.report_data;
                      if (report?.header?.month) {
                          const monthIndex = parseInt(report.header.month, 10) - 1;
                          if (monthIndex >= 0 && monthIndex < 12) {
                              const totals = calculateMonthlyTotals(report);
                              PRESENCE_CATEGORIES.forEach(cat => {
                                  let key;
                                  switch(cat) {
                                      case 'Músicos': key = 'musicians'; break;
                                      case 'Organistas': key = 'organists'; break;
                                      case 'Total (Músicos + Organistas)': key = 'totalMusiciansAndOrganists'; break;
                                      case 'Irmãos Presentes': key = 'brothers'; break;
                                      case 'Irmãs Presentes': key = 'sisters'; break;
                                      case 'Total (Irmãos + Irmãs)': key = 'totalCongregation'; break;
                                      case 'Ministério Presente': key = 'totalMinistry'; break;
                                      case 'Total Geral de Pessoas Envolvidas': key = 'grandTotal'; break;
                                  }
                                  if(key === 'brothers' || key === 'sisters') {
                                      presences[cat][monthIndex] = report.congregation[key] || 0;
                                  } else {
                                      presences[cat][monthIndex] = totals[key];
                                  }
                              });
                              hymns[String(monthIndex + 1)] = (report.hymns || []).filter(h => h && String(h).trim() !== '');
                              if (report.instruments) INSTRUMENTS_LIST.forEach(inst => { instrumentQuantities[inst][monthIndex] = report.instruments[inst] || 0; });
                              if (report.ministry) MINISTRY_LIST.forEach(role => { ministryQuantities[role][monthIndex] = report.ministry[role] || 0; });
                          }
                      }
                  });
                  setAnnualData({ churchName: churchData.name, year: displayedYear, presences, hymns, instrumentQuantities, ministryQuantities });
              }
              setIsLoading(false);
            }
            if (churchData.name) loadAnnualData();
          }, [cep, displayedYear, churchData.name, supabaseInstance]);
          
          const handleSaveJpg = async () => {
              const nodeToCapture = printableRef.current;
              if (!nodeToCapture) {
                  console.error("Elemento do relatório anual não encontrado para captura.");
                  return;
              }
              setIsSavingJpg(true);
              try {
                  const currentScaleMatch = nodeToCapture.style.transform.match(/scale\((.*?)\)/);
                  const currentScale = currentScaleMatch ? parseFloat(currentScaleMatch[1]) : 1;

                  const reportWidth = 1200;
                  const reportHeight = nodeToCapture.scrollHeight; // Captura a altura real do conteúdo

                  // Note: `annualReportElement` is not defined in this scope. 
                  // It should likely be `nodeToCapture` as it's passed as ref.
                  const dataUrl = await htmlToImage.toJpeg(nodeToCapture, { 
                      quality: 1,
                      backgroundColor: '#ffffff',
                      pixelRatio: Math.max(1, 3 / currentScale), // Adjust pixelRatio based on current display scale, min 1
                      width: reportWidth,
                      height: reportHeight,
                      style: {
                          transform: 'none',
                          transformOrigin: 'initial',
                          margin: '0',
                      }
                  });
                  const link = document.createElement('a');
                  link.download = `relatorio-anual-${cep}-${displayedYear}.jpg`;
                  link.href = dataUrl;
                  link.click();
              } catch (err) {
                  console.error('Falha ao gerar imagem do relatório anual:', err);
              } finally {
                  setIsSavingJpg(false);
              }
          };
          
          return (
              <div className="space-y-8">
                  <header className="text-center no-print space-y-4">
                      <h1 className="text-3xl md:text-4xl font-bold text-gray-900 dark:text-gray-100">Visualizador de Relatório Anual</h1>
                      <form onSubmit={handleCepSubmit} className="max-w-lg mx-auto flex flex-col sm:flex-row items-stretch sm:items-end gap-2">
                        <InputField label="CEP da Igreja" name="cep" value={inputCep} onChange={(e) => setInputCep(e.target.value)} placeholder="00000-000" />
                        <button type="submit" className="h-10 px-6 py-2 bg-emerald-600 dark:bg-emerald-700 text-white rounded-md shadow-sm hover:bg-emerald-700 dark:hover:bg-emerald-800 transition-colors" disabled={!supabaseInstance}>Buscar</button>
                      </form>
                      {cep && !isLoading && (
                        <div className="flex justify-center items-center gap-4 flex-wrap">
                           <p className="text-lg text-gray-600 dark:text-gray-300 mt-2">Exibindo para <span className="font-bold">{churchData.name} ({cep.replace(/^(\d{5})(\d{3})$/, '$1-$2')})</span></p>
                           <select name="year" value={displayedYear} onChange={(e) => setDisplayedYear(e.target.value)} className="block w-32 bg-gray-50 dark:bg-gray-700 border-gray-300 dark:border-gray-600 rounded-md shadow-sm h-12 px-3 text-gray-900 dark:text-gray-200">{churchData.availableYears.map(y => <option key={y} value={y}>{y}</option>)}</select>
                          <button onClick={handleSaveJpg} disabled={isSavingJpg || !annualData} className="px-6 py-3 bg-blue-600 dark:bg-blue-700 text-white font-semibold rounded-md shadow-sm hover:bg-blue-700 dark:hover:bg-blue-800 disabled:bg-blue-400 transition-colors">{isSavingJpg ? 'Salvando...' : 'Salvar como JPG'}</button>
                      </div>
                      )}
                  </header>
                  <div ref={wrapperRef} className="p-4 bg-gray-100 dark:bg-gray-900 rounded-lg flex justify-center print-wrapper overflow-x-auto">
                      {isLoading ? <LoadingSpinner text="Buscando dados anuais..." /> : 
                        error ? <InfoBox>{error}</InfoBox> :
                        annualData ? <PrintableAnnualRehearsalReport ref={printableRef} data={annualData} isSavingJpg={isSavingJpg} /> : 
                        cep ? <InfoBox>Nenhum relatório encontrado para {displayedYear}.</InfoBox> : 
                        <InfoBox>Insira um CEP para consultar o relatório anual.</InfoBox>
                      }
                  </div>
              </div>
          );
        };

        const RehearsalAppModule = ({ session, currentSubView, handleSetSubView, supabaseInstance }) => {
            const [saveStatus, setSaveStatus] = useState('idle'); 
            const [lastError, setLastError] = useState('');
            const [reportData, setReportData] = useState(() => createBlankRehearsalReport(getInitialRehearsalHeader()));
            const [availableYears, setAvailableYears] = useState(() => [String(new Date().getFullYear())]);
            
            const autoSaveTimeout = useRef(null);
            const loadController = useRef(new AbortController());
            const isSaving = useRef(false);

            const saveReport = useCallback(async () => {
                if (isSaving.current) return;

                if (autoSaveTimeout.current) {
                    clearTimeout(autoSaveTimeout.current);
                    autoSaveTimeout.current = null;
                }

                const header = reportData.header;
                const cleanedCep = header.cep?.replace(/\D/g, '');
                // Allow saving only if authenticated and all required fields are present
                if (!session || !supabaseInstance || !cleanedCep || cleanedCep.length !== 8 || !header.year || !header.month || !header.date) {
                    setSaveStatus('error'); // Indicate why it couldn't save
                    setLastError('Não é possível salvar: Verifique se você está logado e se o CEP, ano, mês e data estão preenchidos.');
                    return;
                }
                
                isSaving.current = true;
                setSaveStatus('saving');
                setLastError('');

                try {
                    const { error, data, status } = await supabaseInstance.from('rehearsal_reports').upsert({ 
                        cep: cleanedCep, 
                        year: parseInt(header.year), 
                        month: parseInt(header.month), 
                        report_data: reportData,
                        user_id: session.user.id 
                    }, { onConflict: 'cep,year,month' });
                    
                    if (error) {
                        if (status === 401) {
                            throw new Error(`Não autorizado. Verifique seu login e as políticas de RLS no Supabase para a tabela 'rehearsal_reports'. Detalhes: ${error.message}`);
                        }
                        throw error;
                    }

                    setSaveStatus('saved');
                    if (!availableYears.includes(header.year)) {
                        setAvailableYears(p => [...new Set([...p, header.year])].sort((a, b) => parseInt(b) - parseInt(a)));
                    }
                    setTimeout(() => setSaveStatus('idle'), 2000);
                } catch (error) {
                    console.error("Rehearsal Save Error:", error)
                    setLastError('Falha ao salvar: ' + getErrorMessage(error));
                    setSaveStatus('error');
                } finally {
                    isSaving.current = false;
                }
            }, [reportData, session, availableYears, supabaseInstance]);
            
            useEffect(() => {
                if (saveStatus === 'typing') {
                    if (autoSaveTimeout.current) clearTimeout(autoSaveTimeout.current);
                    autoSaveTimeout.current = setTimeout(saveReport, 2500); // Auto-save after 2.5s of inactivity
                }
                return () => {
                    if (autoSaveTimeout.current) {
                        clearTimeout(autoSaveTimeout.current);
                    }
                };
            }, [saveStatus, saveReport]);

            const loadReport = useCallback(async (signal) => {
                // Ensure any pending auto-save is cleared to prevent conflicts
                if (autoSaveTimeout.current) clearTimeout(autoSaveTimeout.current);

                const { cep, year, month } = reportData.header;
                const cleanedCep = cep?.replace(/\D/g, '');
                
                // Only attempt to load if ALL search criteria are met AND user is logged in/Supabase is active.
                if (!session || !supabaseInstance || !cleanedCep || cleanedCep.length !== 8 || !year || !month) {
                    // Do NOT reset reportData here. The user might be actively typing a new report.
                    // Keep the current reportData state (which could be blank or partially filled).
                    setSaveStatus('typing'); // Assume user is typing / report is unsaved
                    setLastError('');
                    return;
                }
                
                try {
                    const { data, error, status } = await supabaseInstance.from('rehearsal_reports').select('report_data').eq('cep', cleanedCep).eq('year', parseInt(year)).eq('month', parseInt(month)).maybeSingle({ signal });
                    if (signal.aborted) return; // Exit if the request was cancelled
                    
                    if (error && error.code !== 'PGRST116') { // PGRST116 means no rows found (not an actual error)
                        if (status === 401) {
                            throw new Error(`Não autorizado. Verifique seu login e as políticas de RLS no Supabase para a tabela 'rehearsal_reports'. Detalhes: ${error.message}`);
                        }
                        throw error;
                    }

                    if (data && data.report_data) {
                        const loadedData = data.report_data;
                        // Ensure visitingOrchestraLeaders array is always present
                        if (!loadedData.header.visitingOrchestraLeaders) loadedData.header.visitingOrchestraLeaders = [''];
                        setReportData(loadedData); // Replace current report with loaded one
                        setSaveStatus('saved'); // It's a fresh load, so consider it saved
                    } else {
                        // No report found for this valid CEP/Year/Month.
                        // DO NOT reset. User might be filling a new one.
                        setSaveStatus('typing'); // Indicate it's unsaved, a new report or modified
                    }
                    setLastError(''); // Clear any previous load errors
                } catch (e) {
                    if (e.name !== 'AbortError') { // Ignore abort errors from rapid typing
                        console.error("Falha ao carregar relatório de ensaio", e); 
                        setLastError('Falha ao carregar: ' + getErrorMessage(e)); 
                        setSaveStatus('error'); 
                    }
                }
            }, [reportData.header.cep, reportData.header.month, reportData.header.year, session, supabaseInstance]);
            
            useEffect(() => { 
                // Abort previous load request if any
                loadController.current.abort();
                loadController.current = new AbortController();
                // Trigger loadReport based on current header values
                loadReport(loadController.current.signal); 

                // Cleanup function
                return () => {
                    loadController.current.abort(); // Abort on unmount or before next effect run
                };
            }, [loadReport]); // `loadReport` is a dependency because it's a `useCallback`

            const createChangeHandler = useCallback((updateFn) => {
                return (...args) => {
                    setReportData(currentData => updateFn(currentData, ...args));
                    setSaveStatus('typing'); 
                };
            }, []);

            const handlers = useMemo(() => ({
                handleHeaderChange: (e) => {
                    const { name, value } = e.target;
                    setReportData(prev => ({ ...prev, header: { ...prev.header, [name]: value } }));
                    setSaveStatus('typing'); // Always mark as typing when header changes
                },
                handleTableChange: createChangeHandler((p, category, name, value) => ({ ...p, [category]: { ...p[category], [name]: value } })),
                handleCongregationChange: createChangeHandler((p, e) => ({ ...p, congregation: { ...p.congregation, [e.target.name]: parseInt(e.target.value) || 0 } })),
                handleHymnsChange: createChangeHandler((p, index, value) => ({ ...p, hymns: p.hymns.map((h, i) => i === index ? value : h) })),
                handleAddHymn: createChangeHandler((p) => ({ ...p, hymns: [...p.hymns, ''] })),
                handleRemoveHymn: createChangeHandler((p, index) => ({ ...p, hymns: p.hymns.length > 1 ? p.hymns.filter((_, i) => i !== index) : p.hymns })),
                handleObservationsChange: createChangeHandler((p, e) => ({ ...p, observations: e.target.value })),
                handleVisitingLeaderChange: createChangeHandler((p, index, value) => ({ ...p, header: { ...p.header, visitingOrchestraLeaders: p.header.visitingOrchestraLeaders.map((l, i) => i === index ? value : l) } })),
                handleAddVisitingLeader: createChangeHandler((p) => ({ ...p, header: { ...p.header, visitingOrchestraLeaders: [...p.header.visitingOrchestraLeaders, ''] } })),
                handleRemoveVisitingLeader: createChangeHandler((p, index) => ({ ...p, header: { ...p.header, visitingOrchestraLeaders: p.header.visitingOrchestraLeaders.length > 1 ? p.header.visitingOrchestraLeaders.filter((_, i) => i !== index) : p.header.visitingOrchestraLeaders }})),
            }), [createChangeHandler]);

            const SaveStatusIndicator = () => {
                if (!supabaseInstance) return <div className="text-center text-yellow-700 dark:text-yellow-400 text-xs font-semibold">Modo Offline (Não é possível salvar)</div>;
                if (!session) return <div className="text-center text-orange-600 dark:text-orange-400 text-xs font-semibold">Você não está logado. O salvamento está desativado.</div>;

                if (saveStatus === 'saving') return <div className="flex items-center gap-1 text-xs text-gray-500 dark:text-gray-400"><svg className="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span>Salvando...</span></div>;
                if (saveStatus === 'saved') return <div className="flex items-center gap-1 text-xs text-green-600 dark:text-green-400"><svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg><span>Salvo na nuvem</span></div>;
                if (saveStatus === 'error') return <div className="flex items-center gap-1 text-xs text-red-600 dark:text-red-400" title={lastError}><svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg><span>Erro: {lastError.split(':')[0]}...</span></div>; {/* Display first part of error and title for full text */}
                if (saveStatus === 'typing') return <div className="flex items-center gap-1 text-xs text-gray-500 dark:text-gray-400"><span>Salvamento automático pendente...</span></div>;
                return <div className="h-5"></div>; 
            }

            return (
                <div id="rehearsal-app-module" className="min-h-screen bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 p-4 sm:p-6 lg:p-8">
                    <div className="max-w-screen-2xl mx-auto">
                        <div className="flex justify-center items-center h-6 mb-4">
                            {currentSubView === 'cadastro' ? <SaveStatusIndicator /> : <p className="text-md sm:text-lg text-gray-600 dark:text-gray-300">Relatórios de ensaio.</p>}
                        </div>
                        <nav className="mt-6 flex justify-center items-center gap-2 sm:gap-4 flex-wrap no-print">
                            <a href="#rehearsal_mensal" onClick={(e) => {e.preventDefault(); handleSetSubView('mensal')}} className={`inline-flex items-center px-4 py-2 sm:px-6 sm:py-3 border border-transparent text-sm sm:text-base font-medium rounded-md shadow-sm transition-colors ${currentSubView === 'mensal' ? 'text-white bg-emerald-600 dark:bg-emerald-700 hover:bg-emerald-700 dark:hover:bg-emerald-800 ring-2 ring-offset-2 ring-emerald-500' : 'text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700'}`}>Visualizar Mensal</a>
                            <a href="#rehearsal_anual" onClick={(e) => {e.preventDefault(); handleSetSubView('anual')}} className={`inline-flex items-center px-4 py-2 sm:px-6 sm:py-3 border border-transparent text-sm sm:text-base font-medium rounded-md shadow-sm transition-colors ${currentSubView === 'anual' ? 'text-white bg-emerald-600 dark:bg-emerald-700 hover:bg-emerald-700 dark:hover:bg-emerald-800 ring-2 ring-offset-2 ring-emerald-500' : 'text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700'}`}>Visualizar Anual</a>
                            {/* Always show "Cadastrar/Editar" button */}
                            <a href="#rehearsal_cadastro" onClick={(e) => {e.preventDefault(); handleSetSubView('cadastro')}} className={`inline-flex items-center px-4 py-2 sm:px-6 sm:py-3 border border-transparent text-sm sm:text-base font-medium rounded-md shadow-sm transition-colors ${currentSubView === 'cadastro' ? 'text-white bg-emerald-600 dark:bg-emerald-700 hover:bg-emerald-700 dark:hover:bg-emerald-800 ring-2 ring-offset-2 ring-emerald-500' : 'text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700'}`}>Cadastrar/Editar</a>
                        </nav>
                        <div className="mt-8">
                            {currentSubView === 'cadastro' ? (
                                // Always render RehearsalEditView, let its internal logic handle saving restrictions
                                <RehearsalEditView reportData={reportData} handlers={handlers} availableYears={availableYears} onManualSave={saveReport} saveStatus={saveStatus} session={session} />
                            ) : currentSubView === 'anual' ? (
                                <RehearsalAnnualReportView supabaseInstance={supabaseInstance} />
                            ) : (
                                <RehearsalMonthlyReportView supabaseInstance={supabaseInstance} />
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Auth Components ---
        const AuthScreen = ({ initialError = '', supabaseInstance, onLoginSuccess }) => {
            const [authMode, setAuthMode] = useState('login'); // 'login', 'signup', 'forgotPassword'
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(initialError);
            const [message, setMessage] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault(); setLoading(true); setError(''); setMessage('');
                const isLogin = authMode === 'login';
                try {
                    if (!supabaseInstance) throw new Error('Supabase client não inicializado.');
                    if (isLogin) {
                        const { error } = await supabaseInstance.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        onLoginSuccess(); // Notify parent on successful login
                    } else { // signup
                        const { error } = await supabaseInstance.auth.signUp({ email, password });
                        if (error) throw error;
                        setMessage('Cadastro realizado! Verifique seu e-mail para confirmar a conta.');
                    }
                } catch (err) { setError(getErrorMessage(err)); } 
                finally { setLoading(false); }
            };

            const handlePasswordReset = async (e) => {
                e.preventDefault(); setLoading(true); setError(''); setMessage('');
                try {
                    if (!supabaseInstance) throw new Error('Supabase client não inicializado.');
                    const { error } = await supabaseInstance.auth.resetPasswordForEmail(email, {
                      redirectTo: window.location.origin + window.location.pathname + '#updatePassword', // Adjust redirect for combined app
                    });
                    if (error) throw error;
                    setMessage('Instruções para redefinir a senha foram enviadas para o seu e-mail.');
                } catch (err) {
                    setError(getErrorMessage(err));
                } finally {
                    setLoading(false);
                }
            };

            const resetFormState = () => {
                setEmail('');
                setPassword('');
                setError('');
                setMessage('');
            }

            if (authMode === 'forgotPassword') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
                        <div className="max-w-md w-full space-y-8">
                            <div><h2 className="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white">Recuperar Senha</h2></div>
                            <form className="mt-8 space-y-6" onSubmit={handlePasswordReset}>
                                <div className="rounded-md shadow-sm">
                                    <div><input id="email-address-reset" name="email" type="email" autoComplete="email" required value={email} onChange={e => setEmail(e.target.value)} className="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 dark:text-gray-200 bg-white dark:bg-gray-700 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Endereço de e-mail" /></div>
                                </div>
                                {error && <p className="text-red-500 text-sm text-center">{error}</p>}
                                {message && <p className="text-green-500 text-sm text-center">{message}</p>}
                                <div><button type="submit" disabled={loading} className="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50">{loading ? 'Enviando...' : 'Enviar Instruções'}</button></div>
                            </form>
                            <div className="text-center">
                                <button onClick={() => { setAuthMode('login'); resetFormState(); }} className="font-medium text-blue-600 hover:text-blue-500">Voltar para o Login</button>
                            </div>
                        </div>
                    </div>
                );
            }
            
            const isLogin = authMode === 'login';
            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
                    <div className="max-w-md w-full space-y-8">
                        <div><h2 className="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white">{isLogin ? 'Acesse sua conta' : 'Crie uma nova conta'}</h2></div>
                        <form className="mt-8 space-y-6" onSubmit={handleAuth}>
                            {error && <p className="text-red-500 text-sm text-center mb-4">{error}</p>}
                            {message && <p className="text-green-500 text-sm text-center mb-4">{message}</p>}
                            <div className="rounded-md shadow-sm -space-y-px">
                                <div><input id="email-address" name="email" type="email" autoComplete="email" required value={email} onChange={e => setEmail(e.target.value)} className="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 dark:text-gray-200 bg-white dark:bg-gray-700 rounded-t-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Endereço de e-mail" /></div>
                                <div><input id="password" name="password" type="password" autoComplete="current-password" required value={password} onChange={e => setPassword(e.target.value)} className="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 dark:text-gray-200 bg-white dark:bg-gray-700 rounded-b-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Senha" /></div>
                            </div>
                            
                            <div className="flex items-center justify-end text-sm">
                                {isLogin && (
                                    <button type="button" onClick={() => { setAuthMode('forgotPassword'); resetFormState(); }} className="font-medium text-blue-600 hover:text-blue-500 focus:outline-none">
                                        Esqueceu a senha?
                                    </button>
                                )}
                            </div>
                            
                            <div><button type="submit" disabled={loading} className="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50">{loading ? 'Processando...' : (isLogin ? 'Entrar' : 'Cadastrar')}</button></div>
                        </form>
                        <div className="text-center">
                            <button onClick={() => { setAuthMode(isLogin ? 'signup' : 'login'); resetFormState(); }} className="font-medium text-blue-600 hover:text-blue-500">
                                {isLogin ? 'Não tem uma conta? Cadastre-se' : 'Já tem uma conta? Entre'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const UpdatePasswordScreen = ({ onUpdateSuccess, supabaseInstance }) => {
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [loading, setLoading] = useState(false);
            const [submitError, setSubmitError] = useState('');
            const [validationError, setValidationError] = useState('');
            const [message, setMessage] = useState('');

            useEffect(() => {
                if (password && password.length < 6) {
                    setValidationError('A senha deve ter pelo menos 6 caracteres.');
                } else if (confirmPassword && password !== confirmPassword) {
                    setValidationError('As senhas digitadas não coincidem.');
                } else {
                    setValidationError('');
                }
            }, [password, confirmPassword]);

            const handleUpdate = async (e) => {
                e.preventDefault();
                
                if (validationError) {
                    setSubmitError(validationError);
                    return;
                }
                if (password !== confirmPassword) {
                    setSubmitError('As senhas não coincidem.');
                    return;
                }

                setLoading(true);
                setSubmitError('');
                setMessage('');

                try {
                    if (!supabaseInstance) throw new Error('Supabase client não inicializado.');
                    const { error } = await supabaseInstance.auth.updateUser({ password });
                    if (error) throw error;
                    setMessage('Senha atualizada com sucesso! Redirecionando...');
                    setTimeout(() => {
                        onUpdateSuccess();
                    }, 2000);
                } catch (err) {
                    if (err.message && err.message.includes('New password should be different')) {
                        setSubmitError('A nova senha deve ser diferente da senha atual.');
                    } else {
                        setSubmitError(getErrorMessage(err));
                    }
                } finally {
                    setLoading(false);
                }
            };
            
            const EyeIcon = ({isOpen}) => isOpen ? 
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z" /><path fillRule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.27 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clipRule="evenodd" /></svg>
                : 
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zM10 12a2 2 0 100-4 2 2 0 000 4z" clipRule="evenodd" /><path d="M2.973 7.646A10.016 10.016 0 00.458 10c1.274 4.057 5.27 7 9.542 7 .847 0 1.67-.111 2.457-.317l-1.878-1.878A4.002 4.002 0 0110 14a4 4 0 01-4-4c0-.77.22-1.48.59-2.093l-1.625-1.625z" /></svg>;

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
                    <div className="max-w-md w-full space-y-8">
                        <div><h2 className="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white">Redefinir sua Senha</h2></div>
                        <form className="mt-8 space-y-6" onSubmit={handleUpdate}>
                            <div className="rounded-md shadow-sm space-y-4">
                                <div className="relative">
                                    <input 
                                        id="new-password" name="password" type={showPassword ? 'text' : 'password'} required 
                                        value={password} onChange={e => { setPassword(e.target.value); setSubmitError(''); }} 
                                        className="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 dark:text-gray-200 bg-white dark:bg-gray-700 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                                        placeholder="Digite sua nova senha" />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none">
                                        <EyeIcon isOpen={showPassword} />
                                    </button>
                                </div>
                                <div className="relative">
                                    <input 
                                        id="confirm-password" name="confirm-password" type={showPassword ? 'text' : 'password'} required 
                                        value={confirmPassword} onChange={e => { setConfirmPassword(e.target.value); setSubmitError(''); }} 
                                        className="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 dark:text-gray-200 bg-white dark:bg-gray-700 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                                        placeholder="Confirme sua nova senha" />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none">
                                        <EyeIcon isOpen={showPassword} />
                                    </button>
                                </div>
                            </div>

                            {(validationError || submitError) && <p className="text-red-500 text-sm text-center">{validationError || submitError}</p>}
                            {message && <p className="text-green-500 text-sm text-center">{message}</p>}

                            <div><button type="submit" disabled={loading || message || !!validationError} className="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed">{loading ? 'Atualizando...' : 'Atualizar Senha'}</button></div>
                        </form>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
          const [session, setSession] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [isLoggingOut, setIsLoggingOut] = useState(false);
          const [currentView, setCurrentView] = useState(() => { // Renamed from mainView
              const hash = window.location.hash.replace(/^#/, '');
              if (hash === 'updatePassword') return 'updatePassword';
              if (hash === 'auth') return 'auth';
              return 'rehearsal'; // Default to rehearsal report
          });
          const [rehearsalSubView, setRehearsalSubView] = useState(() => {
              const hash = window.location.hash.replace(/^#/, '');
              if (hash === 'rehearsal_cadastro') return 'cadastro';
              if (hash === 'rehearsal_anual') return 'anual';
              return 'mensal'; // Default rehearsal subview
          });
          const [authScreenMode, setAuthScreenMode] = useState('login'); // 'login', 'signup', 'forgotPassword'
          const [initialAuthError, setInitialAuthError] = useState('');

          const handleSetView = (newView) => { // Renamed from handleSetMainView
            setCurrentView(newView);
            let newHash = '';
            if (newView === 'auth') newHash = 'auth';
            else if (newView === 'updatePassword') newHash = 'updatePassword';
            else if (newView === 'rehearsal') newHash = `rehearsal_${rehearsalSubView}`; // Keep subview for rehearsal
            window.location.hash = newHash;
          };
          const handleSetRehearsalSubView = (newSubView) => {
            setRehearsalSubView(newSubView);
            window.location.hash = `rehearsal_${newSubView}`;
          };
          const handleSetAuthScreenMode = (mode) => {
            setAuthScreenMode(mode);
            window.location.hash = 'auth'; // Always go to auth view if mode is changed
          };
          const handleLoginSuccess = () => {
              handleSetView('rehearsal'); // Redirect to rehearsal app after login
              window.location.hash = 'rehearsal_cadastro'; // Maybe redirect to editing a new report
          };
          const handlePasswordUpdated = () => {
              handleSetView('auth'); // Go to auth screen to log in with new password
              setAuthScreenMode('login');
              window.location.hash = 'auth';
          };
          
          useEffect(() => {
              if (!supabase) {
                  setAuthLoading(false);
                  return;
              }

              const hash = window.location.hash;
              if (hash.includes('error=access_denied')) {
                  setInitialAuthError('O link para redefinição de senha é inválido ou expirou. Por favor, solicite um novo.');
                  window.history.replaceState(null, document.title, window.location.pathname + window.location.search);
                  handleSetView('auth'); // Force to auth screen to show error
              } else if (hash.includes('type=recovery') && !session) {
                  handleSetView('updatePassword'); // Direct to password update if recovery link
              }

              const getSession = async () => {
                  try {
                      const { data: { session: s } } = await supabase.auth.getSession();
                      setSession(s);
                  } catch (error) {
                      console.error("Erro ao obter sessão:", error);
                  } finally {
                      setAuthLoading(false);
                  }
              };
              getSession();
              
              const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, s) => {
                  if (_event === "PASSWORD_RECOVERY") {
                      handleSetView('updatePassword');
                  } else {
                      setSession(s);
                  }
              });
              
              return () => subscription.unsubscribe();
          }, [session]); // Dependency on session to re-evaluate after login/logout

          useEffect(() => {
              const handleHashChange = () => {
                  const hash = window.location.hash.replace(/^#/, '');
                  if (hash.startsWith('rehearsal_')) {
                      setCurrentView('rehearsal');
                      setRehearsalSubView(hash.substring('rehearsal_'.length));
                  } else if (hash === 'updatePassword') {
                      setCurrentView('updatePassword');
                  } else if (hash === 'auth') {
                      setCurrentView('auth');
                  } else {
                      setCurrentView('rehearsal'); // Default view
                      setRehearsalSubView('mensal');
                  }
              };
              window.addEventListener('hashchange', handleHashChange);
              return () => window.removeEventListener('hashchange', handleHashChange);
          }, []);

          const handleLogout = async () => {
              if (!supabase) return;
              setIsLoggingOut(true);
              try {
                  const { error } = await supabase.auth.signOut();
                  if (error) throw error;
                  handleSetView('auth'); // After logout, go to auth screen
                  setAuthScreenMode('login');
              } catch(error) {
                  alert(`Erro ao sair: ${getErrorMessage(error)}`);
              } finally {
                  setIsLoggingOut(false);
              }
          };

          if (authLoading || isLoggingOut) {
              return <Spinner message={isLoggingOut ? "Saindo..." : "Verificando autenticação..."} />;
          }
          
          const user = session?.user;

          return (
              <div id="app-container" className="min-h-screen bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200">
                  {!supabase && <OfflineWarning />}
                  <header className="bg-white dark:bg-gray-800 shadow-md p-4 flex flex-col sm:flex-row justify-between items-center print-hidden">
                      <h1 className="text-xl sm:text-2xl font-bold text-gray-900 dark:text-gray-100 mb-2 sm:mb-0">Gerador de Relatórios CCB - Ensaio</h1>
                      <nav className="flex items-center gap-2 sm:gap-4 flex-wrap text-sm sm:text-base">
                          {/* Removed 'Financeiro' link */}
                          {user ? (
                              <div className="flex items-center gap-2">
                                  <span className="text-gray-600 dark:text-gray-300">{user.email}</span>
                                  <button onClick={handleLogout} className="text-red-500 hover:text-red-700 font-semibold">Sair</button>
                              </div>
                          ) : (
                              <a href="#auth" onClick={(e) => {e.preventDefault(); handleSetView('auth'); setAuthScreenMode('login');}} className={`font-medium ${currentView === 'auth' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-600 dark:text-gray-300 hover:text-gray-800 dark:hover:text-gray-100'}`}>Login / Cadastro</a>
                          )}
                      </nav>
                  </header>
                  {currentView === 'updatePassword' ? (
                      <UpdatePasswordScreen onUpdateSuccess={handlePasswordUpdated} supabaseInstance={supabase} />
                  ) : currentView === 'auth' ? (
                      supabase ? <AuthScreen initialAuthError={initialAuthError} supabaseInstance={supabase} onLoginSuccess={handleLoginSuccess} /> : <InfoBox>Supabase não está configurado. Não é possível autenticar.</InfoBox>
                  ) : ( // Default view is 'rehearsal'
                      <RehearsalAppModule session={session} currentSubView={rehearsalSubView} handleSetSubView={handleSetRehearsalSubView} supabaseInstance={supabase}/>
                  )}
              </div>
          );
        };
        
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
      })(); // Fecha o IIFE
    </script>
  </body>
</html>
