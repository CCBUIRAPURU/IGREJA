
<!DOCTYPE html>



<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Relatório de Ensaio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @media print {
        body {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          background: white !important;
        }
        .no-print { display: none !important; }
        .print-container {
          padding: 0 !important;
          background-color: transparent !important;
          box-shadow: none !important;
          margin: 0 !important;
          width: 100% !important;
        }
        .print-page {
          width: 100% !important;
          height: auto !important;
          box-shadow: none !important;
          page-break-inside: avoid;
          page-break-after: always;
          overflow: hidden;
        }
        .print-page:last-child { page-break-after: auto; }
      }
    </style>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX/TS -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html-to-image -->
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- @google/genai -->
    <script type="module">
      try {
        const genaiModule = await import("https://esm.sh/@google/genai");
        window.GoogleGenAI = genaiModule.GoogleGenAI;
        window.GenaiType = genaiModule.Type;
      } catch (e) {
        console.error("Failed to load GoogleGenAI module", e);
      }
    </script>
  </head>
  <body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel" data-presets="react,typescript">
      // Globals from CDN
      const { useState, useEffect, useCallback, useMemo, useRef, forwardRef, Fragment } = window.React;
      const { createRoot } = window.ReactDOM;
      const htmlToImage = window.htmlToImage;
      const GoogleGenAI = window.GoogleGenAI;
      const { createClient } = window.supabase;

      // ===== Supabase Setup =====
      const SUPABASE_URL = 'https://akgetdjbyshffjyeeiaa.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrZ2V0ZGpieXNoZmZqeWVlaWFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ3ODgyMTQsImV4cCI6MjA3MDM2NDIxNH0.UiOYnu2g5RF-FhguZ1krXjpbOBJU-l0xsbTgzd2oRA4';
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // ===== From constants.ts =====
      const INSTRUMENT_CATEGORIES = {
        'Madeiras': ['Clarinete', 'Clarinete Alto', 'Clarinete Baixo', 'Corne Inglês', 'Flauta Transversal','Fagote', 'Oboé', 'Oboé D\'Amore', 'Saxofone Alto', 'Saxofone Tenor', 'Saxofone Barítono', 'Saxofone Soprano'],
        'Metais': ['Barítono', 'Eufônio', 'Flugelhorn', 'Trombonito', 'Trompa', 'Trompete', 'Trompete Cornet', 'Tuba', 'Trombone'],
        'Cordas': ['Viola', 'Violino', 'Violoncelo'],
        'Teclas': ['Harmônico (acordeon)', 'Organistas (Órgão)']
      };
      const INSTRUMENTS_LIST = ['Barítono', 'Clarinete', 'Clarinete Alto', 'Clarinete Baixo', 'Corne Inglês', 'Eufônio', 'Fagote', 'Flauta Transversal', 'Flugelhorn', 'Harmônico (acordeon)', 'Oboé', 'Oboé D\'Amore', 'Organistas (Órgão)', 'Saxofone Alto', 'Saxofone Barítono', 'Saxofone Soprano', 'Saxofone Tenor', 'Trombone', 'Trombonito', 'Trompa', 'Trompete', 'Trompete Cornet', 'Tuba', 'Viola', 'Violino', 'Violoncelo'];
      const MINISTRY_LIST = ['Anciães', 'Diáconos', 'Coop. do Ofício Ministerial', 'Coop. de Jovens e Menores', 'Encarregados Regionais', 'Encarregados Locais', 'Examinadoras de Organistas'];
      const MONTHS_LIST = [{ value: '1', label: 'Janeiro' }, { value: '2', label: 'Fevereiro' }, { value: '3', label: 'Março' }, { value: '4', label: 'Abril' }, { value: '5', label: 'Maio' }, { value: '6', label: 'Junho' }, { value: '7', label: 'Julho' }, { value: '8', label: 'Agosto' }, { value: '9', label: 'Setembro' }, { value: '10', label: 'Outubro' }, { value: '11', label: 'Novembro' }, { value: '12', label: 'Dezembro' }];
      const SHORT_MONTHS = ["JAN", "FEV", "MAR", "ABR", "MAI", "JUN", "JUL", "AGO", "SET", "OUT", "NOV", "DEZ"];
      
      // ===== From utils.ts =====
      const calculateMonthlyTotals = (reportData) => {
          if (!reportData || !reportData.instruments || !reportData.ministry || !reportData.congregation) return { musicians: 0, organists: 0, totalMusiciansAndOrganists: 0, brothers: 0, sisters: 0, totalCongregation: 0, totalMinistry: 0, grandTotal: 0, totalHymns: 0 };
          const organists = reportData.instruments['Organistas (Órgão)'] || 0;
          const musicians = Object.values(reportData.instruments).reduce((sum, val) => sum + (val || 0), 0) - organists;
          const totalMusiciansAndOrganists = musicians + organists;
          const totalMinistry = Object.values(reportData.ministry).reduce((sum, val) => sum + (val || 0), 0);
          const brothers = reportData.congregation.brothers || 0;
          const sisters = reportData.congregation.sisters || 0;
          const totalCongregation = brothers + sisters;
          const grandTotal = totalMusiciansAndOrganists + totalMinistry + totalCongregation;
          const totalHymns = (reportData.hymns || []).filter(h => h && String(h).trim() !== '').length;
          return { musicians, organists, totalMusiciansAndOrganists, brothers, sisters, totalCongregation, totalMinistry, grandTotal, totalHymns };
      };
      const initialInstruments = INSTRUMENTS_LIST.reduce((acc, instrument) => ({ ...acc, [instrument]: 0 }), {});
      const initialMinistry = MINISTRY_LIST.reduce((acc, role) => ({ ...acc, [role]: 0 }), {});
      const createBlankReport = (header) => ({
          header,
          instruments: { ...initialInstruments },
          ministry: { ...initialMinistry },
          congregation: { brothers: 0, sisters: 0 },
          hymns: Array(10).fill(''),
          observations: '',
      });
      const getInitialHeader = () => ({
          cep: '', rehearsalType: 'Local', date: new Date().toISOString().split('T')[0], presidedBy: '', homeOrchestraLeader: '',
          visitingOrchestraLeaders: [''], church: '', year: String(new Date().getFullYear()), month: String(new Date().getMonth() + 1),
          estado: '', municipio: '', bairro: '',
      });

      // ===== From services/geminiService.ts =====
      const generateReportSummary = (() => {
          let ai; let apiKeyCache;
          const initializeAI = () => {
              if (ai) return true;
              if (!apiKeyCache) apiKeyCache = window.prompt("Por favor, insira sua Chave de API do Google Gemini:", "");
              if (!apiKeyCache || !GoogleGenAI) { console.error("Chave de API do Gemini ou biblioteca não disponível."); return false; }
              ai = new GoogleGenAI({ apiKey: apiKeyCache });
              return true;
          };
          const formatReportForPrompt = (reportData) => {
              const totals = calculateMonthlyTotals(reportData);
              const filledHymns = (reportData.hymns || []).filter(h => h && h.trim() !== '').join(', ') || 'Nenhum';
              const instrumentSummary = Object.entries(reportData.instruments).filter(([, q]) => q > 0).map(([n, q]) => `${n}: ${q}`).join('\n');
              const ministrySummary = Object.entries(reportData.ministry).filter(([, q]) => q > 0).map(([n, q]) => `${n}: ${q}`).join('\n');
              return `Relatório do Ensaio - Igreja: ${reportData.header.church || 'Não informada'}, Data: ${reportData.header.date}. Presenças: Músicos: ${totals.musicians}, Organistas: ${totals.organists}, Total Músicos: ${totals.totalMusiciansAndOrganists}, Irmãos: ${reportData.congregation.brothers}, Irmãs: ${reportData.congregation.sisters}, Ministério: ${totals.totalMinistry}, Total Geral: ${totals.grandTotal}. Instrumentos: ${instrumentSummary || 'Nenhum'}. Ministério: ${ministrySummary || 'Nenhum'}. Hinos: ${filledHymns}. Obs: ${reportData.observations || 'Nenhuma'}.`;
          }
          return async (reportData) => {
              if (!ai && !initializeAI()) return "Erro: A chave de API não foi configurada.";
              const promptText = formatReportForPrompt(reportData);
              const fullPrompt = `Você é um assistente de um encarregado de orquestra. Analise o relatório de um ensaio e gere um resumo conciso e perspicaz em 2 ou 3 parágrafos curtos. Seja objetivo e foque nos pontos principais. Não use saudações ou despedidas. Aqui estão os dados: ${promptText}`;
              try {
                  const response = await ai.models.generateContent({ model: 'gemini-2.5-flash', contents: fullPrompt });
                  return response.text;
              } catch (error) { console.error("Erro na API Gemini:", error); return "Ocorreu um erro ao gerar o resumo."; }
          };
      })();
      
      // ===== UI Components =====
      const InputField = ({ label, name, value, onChange, placeholder, type = "text", onBlur }) => (
        <div className="flex-1">
          <label htmlFor={name} className="block text-sm font-medium text-gray-600">{label}</label>
          <input type={type} id={name} name={name} value={value} onChange={onChange} onBlur={onBlur} placeholder={placeholder} className="mt-1 block w-full bg-gray-50 border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm text-gray-900 h-10 px-3"/>
        </div>
      );
      const LoadingSpinner = ({ text }) => (
        <div className="text-center text-xl p-8 h-96 flex flex-col items-center justify-center bg-gray-50 rounded-lg text-gray-500">
            <svg className="animate-spin h-8 w-8 text-emerald-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>{text}
        </div>
      );
      const InfoBox = ({ children }) => (<div className="text-center text-xl p-8 h-96 flex items-center justify-center bg-gray-50 rounded-lg text-gray-500">{children}</div>);
      
      const PrintableReport = forwardRef(({ reportData, totals }, ref) => {
        if (!reportData || !totals) return null;
        const { header, instruments, ministry, congregation, hymns } = reportData;
        const { totalMusiciansAndOrganists, totalMinistry, totalCongregation, grandTotal, totalHymns, musicians, organists } = totals;
        const ReportField = ({ label, value, className = '' }) => (<div className={`flex items-baseline ${className}`}><span className="font-semibold text-xl mr-3 text-black">{label}:</span><span className="flex-grow border-b border-dotted border-black text-xl pb-[3px] text-black">{value || '\u00A0'}</span></div>);
        const ReportCheckbox = ({ label, checked }) => (<span className="text-xl mr-6 text-black">({checked ? 'X' : ' '}) {label}</span>);
        const renderValue = (value) => (value === 0 ? '0' : (value || '\u00A0'));
        const instrumentCells = INSTRUMENTS_LIST.map(i => ({ name: i, quantity: instruments[i] || 0 }));
        const numColumns = 3;
        const filledHymns = (hymns || []).filter(h => String(h).trim() !== '');
        const numHymnRows = Math.max(7, Math.ceil(filledHymns.length / numColumns));
        const totalHymnSlots = numHymnRows * numColumns;
        const hymnCells = Array.from({ length: totalHymnSlots }).map((_, i) => filledHymns[i] || '\u00A0');
        const hymnRows = [];
        for (let i = 0; i < hymnCells.length; i += numColumns) { hymnRows.push(hymnCells.slice(i, i + numColumns)); }
        const formattedDate = header.date ? new Date(header.date + 'T00:00:00').toLocaleDateString('pt-BR') : '';
        const formatCep = (cep) => cep ? String(cep).replace(/\D/g, '').replace(/^(\d{5})(\d{3})$/, '$1-$2') : '';
        const fullLocation = [header.church, header.cep ? `CEP: ${formatCep(header.cep)}` : '', header.municipio, header.estado].filter(Boolean).join(' - ');
        
        return (
          <div ref={ref} className="bg-white text-black print-page" style={{ fontFamily: 'Arial, sans-serif' }}>
            <div className="p-[24px]" style={{ width: '1191px', height: '1685px', boxSizing: 'border-box' }}>
              <div className="border-2 border-black p-[12px] h-full flex flex-col">
                <div className="flex items-start mb-[6px]">
                  <div className="border border-black p-[6px] pt-[12px] text-center" style={{ width: '120px', height: '75px'}}>
                    <div className="text-[12px] leading-tight font-bold"><span>CONGREGAÇÃO</span><br/><span>CRISTÃ</span><br/><span>NO BRASIL</span></div>
                  </div>
                  <div className="ml-[24px] flex-grow"><ReportField label="Localidade" value={fullLocation} /></div>
                </div>
                <div className="border-2 border-black p-[12px] space-y-[6px] text-xl mb-[12px]">
                    <div className="flex justify-between items-center">
                        <div className="flex items-center">
                            <span className="font-semibold text-xl mr-3 text-black">Ensaio:</span>
                            <ReportCheckbox label="Local" checked={header.rehearsalType === 'Local'} />
                            <ReportCheckbox label="Técnico" checked={header.rehearsalType === 'Técnico'} />
                            <ReportCheckbox label="Regional" checked={header.rehearsalType === 'Regional'} />
                        </div>
                        <div style={{width: '270px'}}><ReportField label="Data" value={formattedDate} /></div>
                    </div>
                    <ReportField label="Presidido pelo irmão" value={header.presidedBy} />
                    <ReportField label="Encarregado de orquestra da casa" value={header.homeOrchestraLeader} />
                    <ReportField label="Encarregado de orquestra visitante" value={(header.visitingOrchestraLeaders || []).filter(l => l.trim()).join(', ')} />
                </div>
                <div className="flex gap-[12px] flex-grow overflow-hidden">
                    <div className="w-[58%] flex flex-col">
                       <div className="flex-grow flex flex-col text-xl border-2 border-black">
                            <div className="bg-[#9bbb59] text-black font-bold flex"><div className="p-[6px] font-semibold text-left flex-grow border-b-2 border-black">INSTRUMENTOS</div><div className="p-[6px] font-semibold text-center border-l-2 border-b-2 border-black" style={{width: '150px'}}>QUANTIDADE</div></div>
                            <div className="flex-grow flex flex-col">{instrumentCells.map((instrument, index) => (<div key={index} className="flex flex-grow"><div className="p-[6px] text-black flex-grow border-t border-gray-400 flex items-center">{instrument.name}</div><div className="p-[6px] text-center text-black border-l-2 border-black border-t border-gray-400 flex items-center justify-center" style={{width: '150px'}}>{renderValue(instrument.quantity)}</div></div>))}</div>
                            <div className="border-t-2 border-black"><div className="bg-[#ffc000] text-black font-bold flex"><div className="p-[6px] font-semibold flex-grow">TOTAL</div><div className="p-[6px] text-center font-semibold border-l-2 border-black" style={{width: '150px'}}>{renderValue(totalMusiciansAndOrganists)}</div></div><div className="bg-[#ff0000] text-white font-bold"><div className="p-[6px] border-t-2 border-black">Total Geral de Pessoas Envolvidas</div></div></div>
                        </div>
                    </div>
                    <div className="w-[42%] flex flex-col">
                         <div className="border-2 border-black flex-grow flex flex-col">
                            <div className="border-b-2 border-black"><table className="w-full text-xl border-collapse"><thead><tr className="bg-[#9bbb59] text-black font-bold"><th className="border-x border-b border-black p-[6px] font-semibold text-left">MINISTÉRIO PRESENTE</th><th className="border-x border-b border-black p-[6px] font-semibold text-center w-[120px]">QUANTIDADE</th></tr></thead><tbody>{MINISTRY_LIST.map((role) => (<tr key={role}><td className="border-x border-b border-black p-[6px] text-black">{role}</td><td className="border-x border-b border-black p-[6px] text-center text-black">{renderValue(ministry[role])}</td></tr>))}</tbody><tfoot><tr className="bg-[#ffc000] text-black font-bold"><td className="border-x border-b border-black p-[6px] font-semibold">TOTAL</td><td className="border-x border-b border-black p-[6px] text-center font-semibold">{renderValue(totalMinistry)}</td></tr></tfoot></table></div>
                            <div className="border-b-2 border-black"><table className="w-full text-xl border-collapse"><thead><tr className="bg-[#9bbb59] text-black font-bold"><th colSpan={2} className="border-x border-b border-black p-[6px] font-semibold text-center">RESUMO</th></tr></thead><tbody><tr><td className="border-x border-b border-black p-[6px] text-black">Quant. Músicos</td><td className="border-x border-b border-black p-[6px] text-center w-[120px] text-black">{renderValue(musicians)}</td></tr><tr><td className="border-x border-b border-black p-[6px] text-black">Quant. Organistas</td><td className="border-x border-b border-black p-[6px] text-center w-[120px] text-black">{renderValue(organists)}</td></tr></tbody><tfoot><tr className="bg-[#ffc000] text-black font-bold"><td className="border-x border-b border-black p-[6px] font-semibold">TOTAL</td><td className="border-x border-b border-black p-[6px] text-center font-semibold">{renderValue(totalMusiciansAndOrganists)}</td></tr></tfoot></table></div>
                             <div className="border-b-2 border-black"><table className="w-full text-xl border-collapse"><thead><tr className="bg-[#9bbb59] text-black font-bold"><th colSpan={2} className="border-x border-b border-black p-[6px] font-semibold text-center">IRMANDADE PRESENTE</th></tr></thead><tbody><tr><td className="border-x border-b border-black p-[6px] text-black">Irmãos</td><td className="border-x border-b border-black p-[6px] text-center w-[120px] text-black">{renderValue(congregation.brothers)}</td></tr><tr><td className="border-x border-b border-black p-[6px] text-black">Irmãs</td><td className="border-x border-b border-black p-[6px] text-center w-[120px] text-black">{renderValue(congregation.sisters)}</td></tr></tbody><tfoot><tr className="bg-[#ffc000] text-black font-bold"><td className="border-x border-b border-black p-[6px] font-semibold">TOTAL IRMANDADE</td><td className="border-x border-b border-black p-[6px] text-center font-semibold">{renderValue(totalCongregation)}</td></tr></tfoot></table></div>
                            <div className="flex-grow flex flex-col text-xl">
                                <div className="bg-[#9bbb59] text-black font-bold"><div className="p-[6px] font-semibold text-center border-b border-black">HINOS ENSAIADOS</div></div>
                                <div className="flex-grow flex flex-col">{hymnRows.map((row, rowIndex) => (<div key={rowIndex} className="flex flex-grow">{row.map((hymn, cellIndex) => (<div key={cellIndex} className={`border-b border-r border-black text-center p-[6px] w-1/3 text-black flex items-center justify-center ${cellIndex === 0 ? 'border-l' : ''}`}>{hymn}</div>))}</div>))}</div>
                                <div className="border-l border-r border-b border-black"><div className="bg-[#ffc000] text-black font-bold flex"><div className="p-[6px] font-semibold text-left w-2/3 border-r border-black">TOTAL</div><div className="p-[6px] text-center font-semibold w-1/3">{renderValue(totalHymns)}</div></div><div className="bg-[#ff0000] text-white font-bold"><div className="p-[6px] text-center border-t border-black">{renderValue(grandTotal)}</div></div></div>
                            </div>
                        </div>
                    </div>
                </div>
              </div>
            </div>
          </div>
        );
      });

      const HeaderForm = ({ data, onChange, onVisitingLeaderChange, onAddVisitingLeader, onRemoveVisitingLeader, availableYears, onCepBlur, isFetchingCep }) => (
        <div className="bg-white shadow-lg rounded-lg p-6">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                  <label htmlFor="cep" className="block text-sm font-medium text-gray-600">CEP (Chave)</label>
                  <div className="relative mt-1">
                      <input type="text" id="cep" name="cep" value={data.cep} onChange={onChange} onBlur={(e) => onCepBlur(e.target.value)} placeholder="CEP da igreja" className="block w-full bg-gray-50 border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm text-gray-900 h-10 px-3" />
                      {isFetchingCep && <div className="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none"><svg className="animate-spin h-5 w-5 text-emerald-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg></div>}
                  </div>
              </div>
              <div>
                  <label htmlFor="month" className="block text-sm font-medium text-gray-600">Mês</label>
                  <select id="month" name="month" value={data.month} onChange={onChange} className="mt-1 block w-full bg-gray-50 border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm text-gray-900 h-10 px-3">
                      {MONTHS_LIST.map(month => <option key={month.value} value={month.value}>{month.label}</option>)}
                  </select>
              </div>
              <div>
                  <label htmlFor="year" className="block text-sm font-medium text-gray-600">Ano</label>
                  <select id="year" name="year" value={data.year} onChange={onChange} className="mt-1 block w-full bg-gray-50 border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm text-gray-900 h-10 px-3">
                      {availableYears.map(year => <option key={year} value={year}>{year}</option>)}
                  </select>
              </div>
            </div>
            <div className="border-t border-gray-200 pt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
              <InputField label="Igreja (Nome Comum)" name="church" value={data.church} onChange={onChange} placeholder="Ex: Sede, Central"/>
              <InputField label="Município" name="municipio" value={data.municipio} onChange={onChange} placeholder="Preenchido pelo CEP"/>
              <InputField label="Bairro" name="bairro" value={data.bairro} onChange={onChange} placeholder="Preenchido pelo CEP"/>
              <InputField label="Estado" name="estado" value={data.estado} onChange={onChange} placeholder="Preenchido pelo CEP"/>
              <InputField label="Data" name="date" type="date" value={data.date} onChange={onChange} />
              <div className="md:col-span-2">
                  <label htmlFor="rehearsalType" className="block text-sm font-medium text-gray-600">Tipo de Ensaio</label>
                  <select id="rehearsalType" name="rehearsalType" value={data.rehearsalType} onChange={onChange} className="mt-1 block w-full bg-gray-50 border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm text-gray-900 h-10 px-3">
                      <option value="">Selecione</option><option value="Local">Local</option><option value="Técnico">Técnico</option><option value="Regional">Regional</option>
                  </select>
              </div>
              <InputField label="Presidido pelo irmão" name="presidedBy" value={data.presidedBy} onChange={onChange} placeholder="Nome do dirigente"/>
              <InputField label="Encarregado da orquestra da casa" name="homeOrchestraLeader" value={data.homeOrchestraLeader} onChange={onChange} placeholder="Nome do encarregado local"/>
              <div className="md:col-span-2">
                  <label className="block text-sm font-medium text-gray-600 mb-2">Encarregado(s) da orquestra visitante</label>
                  {data.visitingOrchestraLeaders.map((leader, index) => (

      // ===== Auth Components =====
      const Login = () => {
        const [loading, setLoading] = useState(false); const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
        const [error, setError] = useState(''); const [message, setMessage] = useState(''); const [authView, setAuthView] = useState('login');
        const resetFormState = () => { setError(''); setMessage(''); setPassword(''); };
        const handleAuth = async (e) => {
          e.preventDefault(); setLoading(true); resetFormState();
          const { error: authError } = authView === 'signup' ? await supabase.auth.signUp({ email, password }) : await supabase.auth.signInWithPassword({ email, password });
          if (authError) setError(authError.message);
          else if (authView === 'signup') { setMessage('Cadastro realizado! Verifique seu e-mail.'); setAuthView('login'); }

        };

            e.preventDefault(); setLoading(true); resetFormState();
            const { error: resetError } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.href.split('#')[0] });
            if (resetError) { setError(resetError.message); } 
            else { setMessage('Se existir uma conta com este e-mail, um link para redefinição de senha será enviado.'); }

                    <form onSubmit={handlePasswordReset} className="space-y-4">

                </div></div>
             );
        }

        return (
            <div className="max-w-md mx-auto mt-12"><div className="bg-white shadow-lg rounded-lg p-8">
              <h2 className="text-2xl font-bold text-center text-gray-800 mb-6">{authView === 'signup' ? 'Criar Nova Conta' : 'Acessar Cadastro'}</h2>
              {error && <p className="bg-red-100 text-red-700 p-3 rounded mb-4 text-center">{error}</p>}
              {message && <p className="bg-green-100 text-green-700 p-3 rounded mb-4 text-center">{message}</p>}
              <form onSubmit={handleAuth} className="space-y-4">
                <InputField label="Email" name="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="seu@email.com" />
                <InputField label="Senha" name="password" type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Sua senha" />
                {authView === 'login' && (<div className="text-right text-sm"><button type="button" onClick={() => { setAuthView('forgot'); resetFormState(); }} className="text-blue-600 hover:underline">Esqueceu a senha?</button></div>)}
                <button type="submit" disabled={loading} className="w-full inline-flex items-center justify-center px-4 py-2 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-400">
                  {loading ? 'Aguarde...' : (authView === 'signup' ? 'Cadastrar' : 'Entrar')}
                </button>
              </form>
              <div className="text-center mt-4"><button onClick={() => { setAuthView(authView === 'login' ? 'signup' : 'login'); resetFormState(); setEmail(''); }} className="text-sm text-blue-600 hover:underline">{authView === 'login' ? 'Não tem uma conta? Cadastre-se.' : 'Já tem uma conta? Faça login.'}</button></div>
            </div></div>
        );
      };
      
      const UpdatePassword = ({ onPasswordUpdated }) => {
        const [password, setPassword] = useState(''); const [loading, setLoading] = useState(false);
        const [error, setError] = useState(''); const [message, setMessage] = useState('');
        const handleUpdatePassword = async (e) => {
            e.preventDefault(); setLoading(true); setError(''); setMessage('');
            const { error: err } = await supabase.auth.updateUser({ password });
            if (err) { setError(err.message); } 
            else { setMessage('Senha atualizada com sucesso!'); setTimeout(() => onPasswordUpdated(), 2000); }
            setLoading(false);
        };
        return (
            <div className="max-w-md mx-auto mt-12"><div className="bg-white shadow-lg rounded-lg p-8">
                <h2 className="text-2xl font-bold text-center text-gray-800 mb-6">Definir Nova Senha</h2>
                {error && <p className="bg-red-100 text-red-700 p-3 rounded mb-4 text-center">{error}</p>}
                {message && <p className="bg-green-100 text-green-700 p-3 rounded mb-4 text-center">{message}</p>}
                <form onSubmit={handleUpdatePassword} className="space-y-4">
                    <InputField label="Nova Senha" name="password" type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Digite sua nova senha" />
                    <button type="submit" disabled={loading} className="w-full inline-flex items-center justify-center px-4 py-2 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-400">
                        {loading ? 'Salvando...' : 'Salvar Nova Senha'}
                    </button>
                </form>
            </div></div>
        );
      };

      // ===== View Components =====
      const EditView = ({ reportData, handlers, isFetchingCep, availableYears, onManualSave, saveStatus }) => {
          const totals = useMemo(() => calculateMonthlyTotals(reportData), [reportData]);
          const printableRef = useRef(null);
          const [isSavingJpg, setIsSavingJpg] = useState(false);

          const handleSaveJpg = useCallback(async () => {
              if (!printableRef.current) return;
              setIsSavingJpg(true);
              try {
                  const dataUrl = await htmlToImage.toJpeg(printableRef.current, { quality: 0.95, backgroundColor: '#ffffff', pixelRatio: 2 });
                  const link = document.createElement('a');
                  link.download = `relatorio-mensal-${reportData.header.cep}-${reportData.header.month}-${reportData.header.year}.jpg`;
                  link.href = dataUrl;
                  link.click();

          }, [printableRef, reportData]);
          
          return (
              <Fragment>

                      >
                        {saveStatus === 'saving' ? 'Salvando...' : saveStatus === 'saved' ? 'Salvo!' : saveStatus === 'error' ? 'Tentar Novamente' : 'Salvar Alterações'}
                      </button>
                      <button onClick={handleSaveJpg} disabled={isSavingJpg} className="px-6 py-3 bg-blue-600 text-white font-semibold rounded-md shadow-sm hover:bg-blue-700 disabled:bg-blue-400 transition-colors">{isSavingJpg ? 'Salvando JPG...' : 'Salvar como JPG'}</button>

              </Fragment>
          );
      };

      const MonthlyReportView = () => {
          const [cep, setCep] = useState(''); const [inputCep, setInputCep] = useState(''); const [isSavingJpg, setIsSavingJpg] = useState(false);
          const [isLoading, setIsLoading] = useState(false); 
          const printableRef = useRef(null); 
          const wrapperRef = useRef(null); // Ref for scaling container
          const now = new Date();
          const [displayedYear, setDisplayedYear] = useState(String(now.getFullYear())); const [displayedMonth, setDisplayedMonth] = useState(String(now.getMonth() + 1));
          const [reportData, setReportData] = useState(null); const [availableYears, setAvailableYears] = useState([String(now.getFullYear())]);

          const fetchYearsForCep = useCallback(async (currentCep) => {
              if (!currentCep) return; const { data, error } = await supabase.from('reports').select('year').eq('cep', currentCep);
              if (error) console.error('Error fetching years:', error);
              else if (data) { const fetchedYears = new Set(data.map(y => String(y.year))); fetchedYears.add(String(now.getFullYear())); const sortedYears = Array.from(fetchedYears).sort((a, b) => parseInt(b) - parseInt(a)); setAvailableYears(sortedYears); if (!sortedYears.includes(displayedYear)) setDisplayedYear(sortedYears[0]); }
          }, [displayedYear]);

          useEffect(() => { if (cep) fetchYearsForCep(cep); }, [cep, fetchYearsForCep]);
          
          useEffect(() => {
            const loadMonthlyReport = async () => {
              if (!cep || !displayedYear || !displayedMonth) return setReportData(null); setIsLoading(true); setReportData(null);
              const { data, error } = await supabase.from('reports').select('report_data').eq('cep', cep).eq('year', parseInt(displayedYear)).eq('month', parseInt(displayedMonth)).maybeSingle();
              if (data && data.report_data) setReportData(data.report_data);
              setIsLoading(false);
            };
            loadMonthlyReport();
          }, [cep, displayedYear, displayedMonth]);

          // Effect to scale the report to fit the container width
          useEffect(() => {
              const reportEl = printableRef.current;
              const wrapperEl = wrapperRef.current;
              if (!reportEl || !wrapperEl) return;

              const observer = new ResizeObserver(entries => {
                  const entry = entries[0];
                  const wrapperWidth = entry.contentRect.width;
                  const reportWidth = 1191; // The report's intrinsic width

                  if (wrapperWidth > 0 && wrapperWidth < reportWidth) {
                      const scale = wrapperWidth / reportWidth;
                      reportEl.style.transform = `scale(${scale})`;
                      reportEl.style.transformOrigin = 'top center';
                      wrapperEl.style.height = `${reportEl.offsetHeight * scale}px`;
                  } else {
                      reportEl.style.transform = 'none';
                      wrapperEl.style.height = 'auto';
                  }
              });

              observer.observe(wrapperEl);

              return () => observer.disconnect();
          }, [reportData]); // Re-run if the report is loaded/unloaded

          const handleSaveJpg = useCallback(async () => {
            const nodeToCapture = printableRef.current;
            if (!nodeToCapture) {
                console.error("Elemento do relatório não encontrado para captura.");
                return;
            }
            setIsSavingJpg(true);
            try {
                // The intrinsic dimensions of the report.
                const reportWidth = 1191;
                const reportHeight = 1685;

                const dataUrl = await htmlToImage.toJpeg(nodeToCapture, {
                    quality: 0.95,
                    backgroundColor: '#ffffff',
                    pixelRatio: 2, // Capture at 2x resolution for high quality.
                    // Set explicit dimensions for the capture canvas.
                    width: reportWidth,
                    height: reportHeight,
                    // Temporarily override inline styles for the capture, forcing it to render at full size.
                    style: {
                        transform: 'none',
                        transformOrigin: 'initial',
                        margin: 0,
                    }
                });
                
                const link = document.createElement('a');
                link.download = `relatorio-mensal-${cep}-${displayedMonth}-${displayedYear}.jpg`;
                link.href = dataUrl;
                link.click();
            } catch (err) {
                console.error('Falha ao gerar a imagem do relatório:', err);
            } finally {
                setIsSavingJpg(false);
            }
          }, [printableRef, cep, displayedMonth, displayedYear]);

          const totals = useMemo(() => reportData ? calculateMonthlyTotals(reportData) : null, [reportData]);
          const handleCepSubmit = (e) => { e.preventDefault(); setCep(inputCep.replace(/\D/g, '')); };
          
          return (
              <div className="space-y-8">
                  <header className="text-center no-print space-y-4">
                      <h1 className="text-3xl md:text-4xl font-bold text-gray-900">Visualizador de Relatório Mensal</h1>
                      <form onSubmit={handleCepSubmit} className="max-w-xl mx-auto flex flex-col sm:flex-row items-stretch gap-2">
                        <InputField label="CEP da Igreja" name="cep" value={inputCep} onChange={(e) => setInputCep(e.target.value)} placeholder="00000-000" />
                        <div className="flex-1"><label className="block text-sm font-medium text-gray-600">Mês</label><select name="month" value={displayedMonth} onChange={(e) => setDisplayedMonth(e.target.value)} className="mt-1 block w-full bg-gray-50 border-gray-300 rounded-md shadow-sm h-10 px-3">{MONTHS_LIST.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}</select></div>
                        <div className="flex-1"><label className="block text-sm font-medium text-gray-600">Ano</label><select name="year" value={displayedYear} onChange={(e) => setDisplayedYear(e.target.value)} className="mt-1 block w-full bg-gray-50 border-gray-300 rounded-md shadow-sm h-10 px-3">{availableYears.map(y => <option key={y} value={y}>{y}</option>)}</select></div>
                        <div className="self-end"><button type="submit" className="h-10 px-6 py-2 bg-emerald-600 text-white rounded-md shadow-sm hover:bg-emerald-700 transition-colors w-full sm:w-auto">Buscar</button></div>
                      </form>
                      {cep && (

          const hymnFrequency = {};

          const top10Hymns = Object.entries(hymnFrequency).sort(([, a], [, b]) => b - a).slice(0, 10);
          const maxHymnCount = top10Hymns.length > 0 ? top10Hymns[0][1] : 0;

          const monthlyTotals = presences['Total Geral de Pessoas Envolvidas'] || [];
          const validMonths = monthlyTotals.filter(v => typeof v === 'number');
          const averagePresence = validMonths.length > 0 ? Math.round(validMonths.reduce((a, b) => a + b, 0) / validMonths.length) : 0;
          const maxPresence = Math.max(0, ...validMonths.map(v => v || 0));
          const busiestMonthIndex = monthlyTotals.indexOf(maxPresence);
          const busiestMonth = busiestMonthIndex > -1 ? SHORT_MONTHS[busiestMonthIndex] : 'N/A';

          const monthlyMusicians = presences['Total (Músicos + Organistas)'] || [];
          const validMusicianMonths = monthlyMusicians.filter(v => typeof v === 'number');
          const averageMusicians = validMusicianMonths.length > 0 ? Math.round(validMusicianMonths.reduce((a, b) => a + b, 0) / validMusicianMonths.length) : 0;
          
          const categoryTotals = {};

              const total = instruments.reduce((sum, instrument) => {

          const categoryPercentages = {};

          if (totalAllInstruments > 0) {

          const annualMinistryTotals = {};

          const monthlyCategoryTotals = {};
          Object.entries(INSTRUMENT_CATEGORIES).forEach(([category, instruments]) => {

              instruments.forEach(instrument => {

              monthlyCategoryTotals[category] = totals;
          });
          const maxCategoryValue = Math.max(1, ...Object.values(monthlyCategoryTotals).flat().map(v => v || 0));

          const monthlyOrchestra = presences['Total (Músicos + Organistas)'] || Array(12).fill(0);
          const monthlyCongregation = presences['Total (Irmãos + Irmãs)'] || Array(12).fill(0);
          const monthlyComparisonTotals = monthlyOrchestra.map((v, i) => (v || 0) + (monthlyCongregation[i] || 0));
          const maxComparisonTotal = Math.max(1, ...monthlyComparisonTotals);

          const LineChart = ({ data, colors, maxVal }) => {
              const width = 500; const height = 180; const padding = 20;
              const getPath = (dataSet) => {
                  const points = dataSet.map((val, i) => {
                      const x = (i / 11) * (width - 2 * padding) + padding;
                      const y = height - padding - (((val || 0) / maxVal) * (height - 2 * padding));
                      return `${x.toFixed(2)},${y.toFixed(2)}`;
                  }).join(' L ');
                  return `M ${points}`;
              };
              return (
                  <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
                      {[...Array(5)].map((_, i) => ( <line key={i} x1={padding} y1={padding + (i/4)*(height-2*padding)} x2={width-padding} y2={padding + (i/4)*(height-2*padding)} stroke="#e5e7eb" strokeWidth="0.5" /> ))}
                      {Object.entries(data).map(([key, values]) => ( <path key={key} d={getPath(values)} stroke={colors[key]} fill="none" strokeWidth="1.5" /> ))}
                  </svg>
              );
          };

          const pageWrapperClass = !isSavingJpg ? 'mb-8' : '';

          return (
              <div ref={ref} className="p-4 print-container" style={{ width: '1200px', fontFamily: 'Arial, sans-serif' }}>
                  <div className={`bg-white text-xs p-4 shadow-lg flex flex-col print-page text-black ${pageWrapperClass}`} style={{ height: 'auto' }}>
                      <PageHeader year={year} />
                      <div className="mb-4">
                          <div className="text-center font-bold bg-slate-600 text-white py-1">Total de Presenças</div>
                          <table className="w-full border-collapse border border-slate-400">
                              <thead><tr className="bg-slate-200 font-bold"><th className="border border-slate-400 p-1">Categoria</th>{SHORT_MONTHS.map(m => <th key={m} className="border border-slate-400 p-1 text-center">{m}</th>)}<th className="border border-slate-400 p-1 text-center bg-slate-700 text-white">Total</th></tr></thead>
                              <tbody>
                                  {PRESENCE_CATEGORIES.map((cat) => {
                                      const rowData = presences[cat] || Array(12).fill(null);
