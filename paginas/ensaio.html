                                      const isGrandTotalRow = cat === 'Total Geral de Pessoas Envolvidas';
                                      const isMinistryHeaderRow = cat === 'Ministério Presente';
                                      let rowStyle = '';
                                      if (isGrandTotalRow) rowStyle = 'bg-[#c0504d] text-white font-bold';
                                      else if (cat.startsWith('Total (') || isMinistryHeaderRow) rowStyle = 'bg-slate-100 font-semibold';
                                      return (
                                          <Fragment key={cat}>
                                              <tr className={rowStyle}><td className={`border border-slate-400 p-1 font-semibold ${isGrandTotalRow ? 'text-white' : 'text-black'}`}>{cat}</td>{rowData.map((val, i) => <td key={i} className="border border-slate-400 p-1 text-center">{renderCell(val)}</td>)}<td className="border border-slate-400 p-1 text-center font-bold bg-slate-700 text-white">{rowTotal}</td></tr>
                                              {isMinistryHeaderRow && MINISTRY_LIST.map((role) => {
                                                  const ministryRowData = ministryQuantities[role] || Array(12).fill(null);
                                                  const ministryRowTotal = ministryRowData.reduce((acc, val) => acc + (val || 0), 0);
                                                  return ( <tr key={role}><td className={`border border-slate-400 p-1 text-black pl-4`}>{role}</td>{ministryRowData.map((val, i) => <td key={i} className="border border-slate-400 p-1 text-center">{renderCell(val)}</td>)}<td className="border border-slate-400 p-1 text-center font-bold bg-slate-700 text-white">{ministryRowTotal}</td></tr> );
                                              })}
                                          </Fragment>
                                      );
                                  })}
                              </tbody>
                          </table>
                      </div>
                      <div className="flex-grow flex flex-col">
                          <div className="text-center font-bold bg-slate-600 text-white py-1">Hinos Ensaiados</div>
                          <table className="w-full border-collapse border border-slate-400 print:h-full">
                              <thead><tr className="bg-slate-200 font-bold"><th className="border border-slate-400 p-1 w-[12%]">Mês</th><th className="border border-slate-400 p-1">Hinos</th><th className="border border-slate-400 p-1 text-center w-[10%] bg-slate-700 text-white">Total</th></tr></thead>
                              <tbody>{MONTHS_LIST.map((month, i) => (<tr key={month.value}><td className="border border-slate-400 p-1 font-bold bg-slate-600 text-white text-center align-middle">{month.label.toUpperCase()}</td><td className="border border-slate-400 p-1 align-top"><div className="flex flex-wrap items-center gap-y-1">{(hymns[month.value] || []).map((h, j) => (<span key={j} className="px-2 border-r border-slate-400 last:border-r-0">{h}</span>))}</div></td><td className={`border border-slate-400 p-1 text-center font-bold text-white align-middle ${i % 2 === 0 ? 'bg-green-800' : 'bg-blue-900'}`}>{totalHymnsByMonth[i]}</td></tr>))}</tbody>
                              <tfoot><tr className="font-bold bg-[#c0504d] text-white"><th colSpan={2} className="border border-slate-400 p-1 text-right">Total de Hinos Anual</th><th className="border border-slate-400 p-1 text-center">{totalAnnualHymns}</th></tr></tfoot>
                          </table>
                      </div>
                  </div>
                  <div className={`bg-white text-xs p-4 shadow-lg flex flex-col justify-between print-page text-black ${pageWrapperClass}`} style={{ height: 'auto' }}>
                      <div>
                          <PageHeader year={year} />
                          <table className="w-full border-collapse border border-slate-400 text-xs">
                              <thead><tr className="bg-[#9bbb59] font-bold text-black"><th className="border border-slate-400 p-1 w-[20%]">Instrumentos</th>{SHORT_MONTHS.map(m => <th key={m} className="border border-slate-400 p-1 text-center w-[5.5%]">{m}</th>)}<th className="border border-slate-400 p-1 text-center w-[8%] bg-slate-700 text-white">Total</th></tr></thead>
                              <tbody>
                                  {Object.entries(INSTRUMENT_CATEGORIES).map(([category, instruments]) => {
                                      const categoryMonthlyTotals = Array(12).fill(0);
                                      instruments.forEach(instrument => { const instrumentData = instrumentQuantities[instrument] || []; instrumentData.forEach((val, i) => { categoryMonthlyTotals[i] += (val || 0); }); });
                                      const categoryYearlyTotal = categoryMonthlyTotals.reduce((a, b) => a + b, 0);
                                      return (
                                      <Fragment key={category}>
                                          <tr className="font-bold bg-gray-300"><td className="border border-slate-400 p-1">{category}</td>{categoryMonthlyTotals.map((total, i) => <td key={i} className="border border-slate-400 p-1 text-center">{renderCell(total)}</td>)}<td className="border border-slate-400 p-1 text-center bg-slate-700 text-white">{renderCell(categoryYearlyTotal)}</td></tr>
                                          {instruments.map(instrument => {
                                              const rowData = instrumentQuantities[instrument] || Array(12).fill(null);
                                              const rowTotal = rowData.reduce((acc, val) => acc + (val || 0), 0);
                                              return (<tr key={instrument}><td className="border border-slate-400 p-1 pl-4">{instrument}</td>{rowData.map((val, i) => <td key={i} className="border border-slate-400 p-1 text-center">{renderCell(val)}</td>)}<td className="border border-slate-400 p-1 text-center font-bold bg-slate-700 text-white">{renderCell(rowTotal)}</td></tr>);
                                          })}
                                      </Fragment>
                                      );
                                  })}
                              </tbody>
                              <tfoot><tr className="font-bold bg-[#ff0000] text-white"><td className="border border-slate-400 p-1">Total (Músicos + Organistas)</td>{(presences['Total (Músicos + Organistas)'] || Array(12).fill(null)).map((val, i) => <td key={i} className="border border-slate-400 p-1 text-center">{renderCell(val)}</td>)}<td className="border border-slate-400 p-1 text-center bg-slate-700">{renderCell((presences['Total (Músicos + Organistas)'] || []).reduce((a,b) => a + (b || 0), 0))}</td></tr></tfoot>
                          </table>
                      </div>
                  </div>
                  <div className={`bg-white text-xs p-4 shadow-lg flex flex-col print-page text-black ${pageWrapperClass}`} style={{ height: 'auto' }}>
                      <PageHeader year={year} />
                      <div className="flex-grow flex flex-col space-y-4">
                          <div>
                              <div className="text-center font-bold text-lg bg-[#595959] text-white py-1 mb-2">Resumo Analítico Anual</div>
                              <div className="grid grid-cols-2 gap-4">
                                  <div className="space-y-4 flex flex-col">
                                      <div className="border border-slate-400 p-2 flex-grow flex flex-col"><h3 className="text-center font-bold mb-2 uppercase">Presença Mensal (Total Geral)</h3><div className="flex-grow flex items-end justify-around px-2 gap-1">{monthlyTotals.map((total, i) => (<div key={i} className="w-full flex flex-col items-center justify-end h-full"><span className="text-[10px] font-semibold">{renderCell(total)}</span><div className="w-full bg-sky-500 rounded-t" style={{ height: `${maxPresence > 0 ? ((total || 0) / maxPresence) * 100 : 0}%` }}></div></div>))}</div><div className="flex justify-around text-center text-[10px] border-t mt-1 pt-1 font-bold">{SHORT_MONTHS.map(m => <span key={m} className="flex-1">{m}</span>)}</div></div>
                                      <div className="border border-slate-400 p-2"><h3 className="text-center font-bold mb-2 uppercase">Composição Média da Orquestra</h3><div className="w-full h-8 flex rounded overflow-hidden my-2">{Object.entries(categoryPercentages).map(([category, percentage]) => { if(!percentage || percentage === 0) return null; return ( <div key={category} className="flex items-center justify-center text-white text-xs font-bold" style={{ width: `${percentage}%`, backgroundColor: categoryColors[category] }}>{percentage > 5 ? `${percentage}%` : ''}</div> ) })}</div><div className="flex flex-wrap justify-center gap-x-4 gap-y-1 mt-2">{Object.entries(categoryColors).map(([category, color]) => ( <div key={category} className="flex items-center"><span className="w-3 h-3 mr-1" style={{ backgroundColor: color }}></span><span className="text-[10px]">{category} ({categoryPercentages[category] || 0}%)</span></div> ))}</div></div>
                                  </div>
                                  <div className="space-y-4 flex flex-col">
                                      <div className="border border-slate-400 p-2"><h3 className="text-center font-bold mb-2 uppercase">Principais Métricas Anuais</h3><div className="grid grid-cols-2 gap-2 text-center"><StatCard label="Média de Músicos" value={averageMusicians} bgColor="bg-blue-100"/><StatCard label="Média de Presença" value={averagePresence} bgColor="bg-sky-100"/><StatCard label="Mês de Pico" value={busiestMonth} bgColor="bg-amber-100"/><StatCard label="Total Hinos Ensaiados" value={totalAnnualHymns} bgColor="bg-green-100"/></div></div>
                                      <div className="border border-slate-400 p-2 flex-grow flex flex-col"><h3 className="text-center font-bold mb-2 uppercase">Top 10 Hinos Mais Ensaiados</h3><div className="space-y-1 px-2 mt-2">{top10Hymns.length > 0 ? top10Hymns.map(([hymn, count]) => ( <div key={hymn} className="flex items-center text-xs gap-2"><div className="w-8 font-bold text-slate-700 text-center">{hymn}</div><div className="flex-grow bg-slate-200 rounded h-5 flex items-center"><div className="bg-emerald-600 h-full rounded text-right px-1 flex items-center justify-end" style={{ width: `${maxHymnCount > 0 ? (count / maxHymnCount) * 100 : 0}%` }}><span className="text-white text-[10px] font-bold">{count}x</span></div></div></div> )) : <p className="text-center text-slate-500">Não há dados de hinos.</p>}</div></div>
                                      <div className="border border-slate-400 p-2"><h3 className="text-center font-bold mb-2 uppercase">Presença Anual do Ministério</h3><table className="w-full text-[10px]"><tbody>{MINISTRY_LIST.slice(0, 5).map(role => (<tr key={role} className="border-t first:border-t-0"><td className="p-1 font-semibold">{role}</td><td className="p-1 text-right font-bold">{annualMinistryTotals[role] || 0}</td></tr>))}</tbody></table></div>
                                  </div>
                              </div>
                          </div>
                          <div className="flex-grow border-t-2 border-slate-300 pt-2 flex flex-col">
                              <div className="text-center font-bold text-base bg-[#595959] text-white py-1 mb-2">Análise de Tendências e Detalhes</div>
                              <div className="grid grid-cols-2 gap-4 flex-grow">
                                   <div className="border border-slate-400 p-2 flex flex-col"><h3 className="text-center font-bold mb-1 uppercase">Tendência por Categoria de Instrumento</h3><div className="flex-grow relative"><LineChart data={monthlyCategoryTotals} colors={categoryColors} maxVal={maxCategoryValue} /></div><div className="flex flex-wrap justify-center gap-x-3 gap-y-1 text-[10px] border-t pt-1 mt-1">{Object.entries(categoryColors).map(([category, color]) => ( <div key={category} className="flex items-center"><span className="w-3 h-3 mr-1" style={{ backgroundColor: color }}></span><span>{category}</span></div> ))}</div></div>
                                  <div className="border border-slate-400 p-2 flex flex-col"><h3 className="text-center font-bold mb-1 uppercase">Comparativo: Orquestra vs. Irmandade</h3><div className="flex-grow flex items-end justify-around px-2 gap-1">{monthlyComparisonTotals.map((total, i) => { const orchestra = monthlyOrchestra[i] || 0; const congregation = monthlyCongregation[i] || 0; return ( <div key={i} className="w-full flex flex-col items-center justify-end h-full"><span className="text-[9px] font-semibold text-orange-600">{congregation}</span><span className="text-[9px] font-semibold text-sky-600 -mb-1">{orchestra}</span><div className="w-full flex flex-col-reverse rounded-t overflow-hidden" style={{ height: `${(total / maxComparisonTotal) * 100}%` }}><div style={{ height: `${total > 0 ? (congregation/total)*100 : 0}%`, backgroundColor: '#fdba74' }}></div><div style={{ height: `${total > 0 ? (orchestra/total)*100 : 0}%`, backgroundColor: '#7dd3fc' }}></div></div></div> )})}</div><div className="flex justify-around text-center text-[10px] border-t mt-1 pt-1 font-bold">{SHORT_MONTHS.map(m => <span key={m} className="flex-1">{m}</span>)}</div></div>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          );
      });

      const AnnualReportView = () => {
        const [cep, setCep] = useState(''); const [inputCep, setInputCep] = useState('');
        const [churchData, setChurchData] = useState({ name: '', availableYears: [String(new Date().getFullYear())] });
        const [displayedYear, setDisplayedYear] = useState(String(new Date().getFullYear()));
        const [annualData, setAnnualData] = useState(null); const [isLoading, setIsLoading] = useState(false);
        const [error, setError] = useState(''); const [isSavingJpg, setIsSavingJpg] = useState(false);
        const printableRef = useRef(null);

        const handleCepSubmit = (e) => { e.preventDefault(); setCep(inputCep.replace(/\D/g, '')); };
        
        useEffect(() => {
          const fetchChurchMetadata = async () => {
            if (!cep || cep.length !== 8) { setChurchData({ name: '', availableYears: [String(new Date().getFullYear())] }); setAnnualData(null); return; }
            setIsLoading(true); setError('');
            const { data, error: err } = await supabase.from('reports').select('year, report_data->header->>church').eq('cep', cep);
            if(err) { setError('Falha ao buscar dados do CEP.'); setChurchData({ name: '', availableYears: [String(new Date().getFullYear())] }); } 
            else if (data && data.length > 0) {
                const fetchedYears = new Set(data.map(y => String(y.year))); fetchedYears.add(String(new Date().getFullYear()));
                const sortedYears = Array.from(fetchedYears).sort((a,b) => parseInt(b) - parseInt(a));
                const latestReport = data.sort((a,b) => b.year - a.year).find(r => r.church);
                setChurchData({ name: latestReport ? latestReport.church : 'Igreja (Nome não encontrado)', availableYears: sortedYears });
                if (!sortedYears.includes(displayedYear)) setDisplayedYear(sortedYears[0]);
            } else { setChurchData({ name: 'Igreja (Nenhum relatório)', availableYears: [String(new Date().getFullYear())] }); }
            setIsLoading(false);
          };
          fetchChurchMetadata();
        }, [cep, displayedYear]);

        useEffect(() => {
          const loadAnnualData = async () => {
            if (!cep || !displayedYear) return setAnnualData(null);
            setIsLoading(true); setError(''); setAnnualData(null);
            const { data: reports, error: fetchError } = await supabase.from('reports').select('report_data').eq('cep', cep).eq('year', parseInt(displayedYear));
            if(fetchError) { setError("Falha ao carregar dados anuais."); }
            else if (reports && reports.length > 0) {
                const PRESENCE_CATEGORIES = ['Músicos', 'Organistas', 'Total (Músicos + Organistas)', 'Irmãos Presentes', 'Irmãs Presentes', 'Total (Irmãos + Irmãs)', 'Ministério Presente', 'Total Geral de Pessoas Envolvidas'];
                const presences = {}; PRESENCE_CATEGORIES.forEach(cat => presences[cat] = Array(12).fill(null));
                const hymns = {}; for (let i = 1; i <= 12; i++) { hymns[String(i)] = []; }
                const instrumentQuantities = {}; INSTRUMENTS_LIST.forEach(inst => { instrumentQuantities[inst] = Array(12).fill(null); });
                const ministryQuantities = {}; MINISTRY_LIST.forEach(role => { ministryQuantities[role] = Array(12).fill(null); });
                
                reports.forEach(record => {
                    const report = record.report_data;
                    if (report?.header?.month) {
                        const monthIndex = parseInt(report.header.month, 10) - 1;
                        if (monthIndex >= 0 && monthIndex < 12) {
                            const totals = calculateMonthlyTotals(report);
                            PRESENCE_CATEGORIES.forEach(cat => {
                                let key;
                                switch(cat) {
                                    case 'Músicos': key = 'musicians'; break;
                                    case 'Organistas': key = 'organists'; break;
                                    case 'Total (Músicos + Organistas)': key = 'totalMusiciansAndOrganists'; break;
                                    case 'Irmãos Presentes': key = 'brothers'; break;
                                    case 'Irmãs Presentes': key = 'sisters'; break;
                                    case 'Total (Irmãos + Irmãs)': key = 'totalCongregation'; break;
                                    case 'Ministério Presente': key = 'totalMinistry'; break;
                                    case 'Total Geral de Pessoas Envolvidas': key = 'grandTotal'; break;
                                }
                                if(key === 'brothers' || key === 'sisters') {
                                    presences[cat][monthIndex] = report.congregation[key] || 0;
                                } else {
                                    presences[cat][monthIndex] = totals[key];
                                }
                            });
                            hymns[String(monthIndex + 1)] = (report.hymns || []).filter(h => h && String(h).trim() !== '');
                            if (report.instruments) INSTRUMENTS_LIST.forEach(inst => { instrumentQuantities[inst][monthIndex] = report.instruments[inst] || 0; });
                            if (report.ministry) MINISTRY_LIST.forEach(role => { ministryQuantities[role][monthIndex] = report.ministry[role] || 0; });
                        }
                    }
                });
                setAnnualData({ churchName: churchData.name, year: displayedYear, presences, hymns, instrumentQuantities, ministryQuantities });
            }
            setIsLoading(false);
          }
          if (churchData.name) loadAnnualData();
        }, [cep, displayedYear, churchData.name]);
        
        const handleSaveJpg = async () => { 
            if (!printableRef.current) return; setIsSavingJpg(true);
            try {
                const dataUrl = await htmlToImage.toJpeg(printableRef.current, { quality: 1, backgroundColor: '#ffffff', pixelRatio: 2 });
                const link = document.createElement('a');
                link.download = `relatorio-anual-${cep}-${displayedYear}.jpg`;
                link.href = dataUrl;
                link.click();
            } catch (err) { console.error('Falha ao gerar imagem:', err); } finally { setIsSavingJpg(false); }
        };
        
        return (
            <div className="space-y-8">
                <header className="text-center no-print space-y-4">
                    <h1 className="text-3xl md:text-4xl font-bold text-gray-900">Visualizador de Relatório Anual</h1>
                    <form onSubmit={handleCepSubmit} className="max-w-lg mx-auto flex flex-col sm:flex-row items-stretch sm:items-end gap-2">
                      <InputField label="CEP da Igreja" name="cep" value={inputCep} onChange={(e) => setInputCep(e.target.value)} placeholder="00000-000" />
                      <button type="submit" className="h-10 px-6 py-2 bg-emerald-600 text-white rounded-md shadow-sm hover:bg-emerald-700 transition-colors">Buscar</button>
                    </form>
                    {cep && !isLoading && (
                      <div className="flex justify-center items-center gap-4 flex-wrap">
                         <p className="text-lg text-gray-600 mt-2">Exibindo para <span className="font-bold">{churchData.name} ({cep.replace(/^(\d{5})(\d{3})$/, '$1-$2')})</span></p>
                         <select name="year" value={displayedYear} onChange={(e) => setDisplayedYear(e.target.value)} className="block w-32 bg-gray-50 border-gray-300 rounded-md shadow-sm h-12 px-3">{churchData.availableYears.map(y => <option key={y} value={y}>{y}</option>)}</select>
                        <button onClick={handleSaveJpg} disabled={isSavingJpg || !annualData} className="px-6 py-3 bg-blue-600 text-white font-semibold rounded-md shadow-sm hover:bg-blue-700 disabled:bg-blue-400 transition-colors">{isSavingJpg ? 'Salvando...' : 'Salvar como JPG'}</button>
                    </div>
                    )}
                </header>
                <div className="p-4 bg-gray-100 rounded-lg flex justify-center print-wrapper overflow-x-auto">
                    {isLoading ? <LoadingSpinner text="Buscando dados anuais..." /> : 
                      error ? <InfoBox>{error}</InfoBox> :
                      annualData ? <PrintableAnnualReport ref={printableRef} data={annualData} isSavingJpg={isSavingJpg} /> : 
                      cep ? <InfoBox>Nenhum relatório encontrado para {displayedYear}.</InfoBox> : 
                      <InfoBox>Insira um CEP para consultar o relatório anual.</InfoBox>
                    }
                </div>
            </div>
        );
      };

      // ===== Main App Component =====
      const App = () => {
        const [session, setSession] = useState(null);
        const [authLoading, setAuthLoading] = useState(true);
        const [view, setView] = useState(() => (window.location.hash.replace(/^#/, '') || 'mensal'));
        const [saveStatus, setSaveStatus] = useState('idle'); // 'idle', 'typing', 'saving', 'saved', 'error'
        const [lastError, setLastError] = useState('');
        const [reportData, setReportData] = useState(() => createBlankReport(getInitialHeader()));
        const [availableYears, setAvailableYears] = useState(() => [String(new Date().getFullYear())]);
        const [isFetchingCep, setIsFetchingCep] = useState(false);
        
        const autoSaveTimeout = useRef(null);
        const loadController = useRef(new AbortController());
        const isSaving = useRef(false);

        // Auth listener
        useEffect(() => {
          supabase.auth.getSession().then(({ data: { session: s } }) => { setSession(s); setAuthLoading(false); });
          const { data: { subscription } } = supabase.auth.onAuthStateChange((event, s) => { 
            setSession(s);
            if (event === 'PASSWORD_RECOVERY') {
              setView('updatePassword');
              window.location.hash = 'updatePassword';
            } else if (event === 'SIGNED_IN') {
              setView('cadastro');
              window.location.hash = 'cadastro';
            }
          });
          return () => subscription.unsubscribe();
        }, []);

        // Hash routing
        useEffect(() => {
          const handleHashChange = () => setView(window.location.hash.replace(/^#/, '') || 'mensal');
          window.addEventListener('hashchange', handleHashChange);
          return () => window.removeEventListener('hashchange', handleHashChange);
        }, []);

        const handleSetView = (newView) => window.location.hash = newView;
        const handleLogout = async () => { await supabase.auth.signOut(); handleSetView('mensal'); };
        
        const saveReport = useCallback(async () => {
            if (isSaving.current) return;

            // Clear any pending auto-save, as we are now saving.
            if (autoSaveTimeout.current) {
                clearTimeout(autoSaveTimeout.current);
                autoSaveTimeout.current = null;
            }

            const header = reportData.header;
            const cleanedCep = header.cep?.replace(/\D/g, '');
            if (!session || !cleanedCep || cleanedCep.length !== 8 || !header.year || !header.month || !header.date) {
                setSaveStatus('idle'); // Not enough data to save, so reset status.
                return;
            }
            
            isSaving.current = true;
            setSaveStatus('saving');
            setLastError('');

            try {
                const { error } = await supabase.from('reports').upsert({ cep: cleanedCep, year: parseInt(header.year), month: parseInt(header.month), report_data: reportData, user_id: session.user.id }, { onConflict: 'cep,year,month' });
                if (error) throw error;

                setSaveStatus('saved');
                if (!availableYears.includes(header.year)) {
                    setAvailableYears(p => [...new Set([...p, header.year])].sort((a, b) => parseInt(b) - parseInt(a)));
                }
                // Reset to idle after 2 seconds to show the "Salvo!" message
                setTimeout(() => setSaveStatus('idle'), 2000);
            } catch (error) {
                console.error("Save Error:", error)
                setLastError('Falha ao salvar: ' + error.message);
                setSaveStatus('error');
            } finally {
                isSaving.current = false;
            }
        }, [reportData, session, availableYears]);
        
        useEffect(() => {
            if (saveStatus === 'typing') {
                if (autoSaveTimeout.current) clearTimeout(autoSaveTimeout.current);
                autoSaveTimeout.current = setTimeout(saveReport, 2500); // Auto-save after 2.5s of inactivity
            }
            // Cleanup function to clear timeout if status changes or component unmounts.
            return () => {
                if (autoSaveTimeout.current) {
                    clearTimeout(autoSaveTimeout.current);
                }
            };
        }, [saveStatus, saveReport]);

        const loadReport = useCallback(async (signal) => {
            if (autoSaveTimeout.current) clearTimeout(autoSaveTimeout.current);

            const { cep, year, month } = reportData.header;
            const cleanedCep = cep?.replace(/\D/g, '');
            if (!session || view !== 'cadastro' || !cleanedCep || cleanedCep.length !== 8 || !year || !month) return;
            
            try {
                const { data, error } = await supabase.from('reports').select('report_data').eq('cep', cleanedCep).eq('year', parseInt(year)).eq('month', parseInt(month)).maybeSingle();
                if (signal.aborted) return;
                if (error) throw error;

                if (data && data.report_data) {
                    const loadedData = data.report_data;
                    if (!loadedData.header.visitingOrchestraLeaders) loadedData.header.visitingOrchestraLeaders = [''];
                    setReportData(loadedData);
                } else {
                    const { data: churchNameData } = await supabase.from('reports').select('report_data->header->>church').eq('cep', cleanedCep).not('report_data->header->>church', 'is', null).limit(1).single();
                    if (signal.aborted) return;
                    setReportData(prev => createBlankReport({ ...getInitialHeader(), cep: prev.header.cep, church: churchNameData?.church || '', year: prev.header.year, month: prev.header.month }));
                }
                setSaveStatus('idle'); 
            } catch (e) {
                if (e.name !== 'AbortError') { console.error("Falha ao carregar relatório", e); setLastError('Falha ao carregar.'); setSaveStatus('error'); }
            }
        }, [reportData.header.cep, reportData.header.month, reportData.header.year, session, view]);
        
        useEffect(() => { 
          loadController.current.abort();
          loadController.current = new AbortController();
          loadReport(loadController.current.signal); 
        }, [loadReport]);

        const createChangeHandler = useCallback((updateFn) => {
            return (...args) => {
                setReportData(currentData => updateFn(currentData, ...args));
                setSaveStatus('typing'); // Mark as dirty. The useEffect will handle the timer.
            };
        }, []);

        const handlers = useMemo(() => ({
            handleHeaderChange: (e) => {
              const { name, value } = e.target;
              if (name === 'month' || name === 'year' || name === 'cep') {
                  // These changes trigger a reload, not a save.
                  if (autoSaveTimeout.current) clearTimeout(autoSaveTimeout.current);
                  setSaveStatus('idle'); 
              } else {
                  setSaveStatus('typing');
              }
              setReportData(prev => ({ ...prev, header: { ...prev.header, [name]: value } }));
            },
            handleTableChange: createChangeHandler((p, category, name, value) => ({ ...p, [category]: { ...p[category], [name]: value } })),
            handleCongregationChange: createChangeHandler((p, e) => ({ ...p, congregation: { ...p.congregation, [e.target.name]: parseInt(e.target.value) || 0 } })),
            handleHymnsChange: createChangeHandler((p, index, value) => ({ ...p, hymns: p.hymns.map((h, i) => i === index ? value : h) })),
            handleAddHymn: createChangeHandler((p) => ({ ...p, hymns: [...p.hymns, ''] })),
            handleRemoveHymn: createChangeHandler((p, index) => ({ ...p, hymns: p.hymns.length > 1 ? p.hymns.filter((_, i) => i !== index) : p.hymns })),
            handleObservationsChange: createChangeHandler((p, e) => ({ ...p, observations: e.target.value })),
            handleVisitingLeaderChange: createChangeHandler((p, index, value) => ({ ...p, header: { ...p.header, visitingOrchestraLeaders: p.header.visitingOrchestraLeaders.map((l, i) => i === index ? value : l) } })),
            handleAddVisitingLeader: createChangeHandler((p) => ({ ...p, header: { ...p.header, visitingOrchestraLeaders: [...p.header.visitingOrchestraLeaders, ''] } })),
            handleRemoveVisitingLeader: createChangeHandler((p, index) => ({ ...p, header: { ...p.header, visitingOrchestraLeaders: p.header.visitingOrchestraLeaders.length > 1 ? p.header.visitingOrchestraLeaders.filter((_, i) => i !== index) : p.header.visitingOrchestraLeaders }})),
            handleCepBlur: async (cep) => {
                const cleanedCep = cep.replace(/\D/g, ''); if (cleanedCep.length !== 8) return;
                
                // Triggers the data loading effect
                handlers.handleHeaderChange({ target: { name: 'cep', value: cleanedCep } });

                setIsFetchingCep(true);
                try {
                    const res = await fetch(`https://viacep.com.br/ws/${cleanedCep}/json/`);
                    const cepData = await res.json();
                    if (cepData.erro) throw new Error('CEP inválido');
                    
                    setReportData(p => ({ ...p, header: { ...p.header, municipio: cepData.localidade, estado: cepData.uf, bairro: cepData.bairro } }));
                    // This change will trigger the auto-save
                    setSaveStatus('typing');
                } catch (error) { console.error("Erro ao buscar CEP:", error); } finally { setIsFetchingCep(false); }
            }
        }), [createChangeHandler]);

        const AppHeader = ({ session, setView, onLogout, currentView, saveStatus, lastError }) => {
            const navItemClasses = "inline-flex items-center px-4 py-2 sm:px-6 sm:py-3 border border-transparent text-sm sm:text-base font-medium rounded-md shadow-sm transition-colors";
            const activeClasses = "text-white bg-emerald-600 hover:bg-emerald-700 ring-2 ring-offset-2 ring-emerald-500";
            const inactiveClasses = "text-gray-700 bg-white hover:bg-gray-50";

            const SaveStatusIndicator = () => {
              if (!session) return null;
              if (saveStatus === 'saving') return <div className="flex items-center gap-1 text-xs text-gray-500"><svg className="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span>Salvando...</span></div>;
              if (saveStatus === 'saved') return <div className="flex items-center gap-1 text-xs text-green-600"><svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg><span>Salvo na nuvem</span></div>;
              if (saveStatus === 'error') return <div className="flex items-center gap-1 text-xs text-red-600" title={lastError}><svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg><span>Erro ao salvar</span></div>;
              if (saveStatus === 'typing') return <div className="flex items-center gap-1 text-xs text-gray-500"><span>Salvamento automático pendente...</span></div>;
              return <div className="h-5"></div>; // Placeholder
            }
            return (
                <header className="text-center mb-8 no-print">
                  <h1 className="text-3xl sm:text-4xl font-bold text-gray-900">Gerador de Relatório de Ensaio</h1>
                  <div className="flex justify-center items-center h-6 mt-2">
                    {currentView === 'cadastro' ? <SaveStatusIndicator /> : <p className="text-md sm:text-lg text-gray-600">Relatórios públicos e cadastro seguro.</p>}
                  </div>
                   <nav className="mt-6 flex justify-center items-center gap-2 sm:gap-4 flex-wrap">
                       <a href="#mensal" onClick={(e) => {e.preventDefault(); handleSetView('mensal')}} className={`${navItemClasses} ${currentView === 'mensal' ? activeClasses : inactiveClasses}`}>Relatório Mensal</a>
                       <a href="#anual" onClick={(e) => {e.preventDefault(); handleSetView('anual')}} className={`${navItemClasses} ${currentView === 'anual' ? activeClasses : inactiveClasses}`}>Relatório Anual</a>
                       <a href="#cadastro" onClick={(e) => {e.preventDefault(); handleSetView('cadastro')}} className={`${navItemClasses} ${currentView === 'cadastro' ? activeClasses : inactiveClasses}`}>{session ? 'Cadastro' : 'Login / Cadastro'}</a>
                  </nav>
                  {session && currentView !== 'updatePassword' && (
                       <div className="mt-4 flex justify-center items-center gap-4">
                          <span className="text-sm text-gray-600">{session.user.email}</span>
                          <button onClick={onLogout} className="text-sm text-blue-600 hover:underline font-semibold">Sair</button>
                       </div>
                   )}
                </header>
            );
        };
        
        const renderView = () => {
            switch (view) {
                case 'anual': return <AnnualReportView />;
                case 'cadastro': return session ? <EditView reportData={reportData} handlers={handlers} isFetchingCep={isFetchingCep} availableYears={availableYears} onManualSave={saveReport} saveStatus={saveStatus} /> : <Login />;
                case 'updatePassword': return <UpdatePassword onPasswordUpdated={() => handleSetView('cadastro')} />;
                default: return <MonthlyReportView />;
            }
        };

        if (authLoading) return <LoadingSpinner text="Autenticando..." />;
        
        return (
            <div id="app-container" className="min-h-screen bg-gray-100 text-gray-800 p-4 sm:p-6 lg:p-8">
              <div className="max-w-screen-2xl mx-auto">
                <AppHeader session={session} setView={handleSetView} onLogout={handleLogout} currentView={view} saveStatus={saveStatus} lastError={lastError}/>
                {renderView()}
              </div>
            </div>
        );
      };
      
      const root = createRoot(document.getElementById('root'));
      root.render(<App />);

    </script>
  </body>
</html>
